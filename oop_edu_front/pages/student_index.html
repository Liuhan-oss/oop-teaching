// ==================== 学习分析（基于实际作业总分动态计算）====================
function loadAnalysis() {
    setActiveMenuItem(event.target);
    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-chart-line"></i> 学习分析';

    const checkedHomework = JSON.parse(localStorage.getItem('checkedHomework') || '[]');
    const homeworkListAll = JSON.parse(localStorage.getItem('homeworkList') || '[]');
    const myRecords = checkedHomework.filter(s => s.studentId === currentStudent.id);

    if (myRecords.length === 0) {
        document.getElementById('content').innerHTML = `
            <div class="card" style="text-align: center; padding: 60px;">
                <i class="fas fa-chart-line" style="font-size: 60px; color: #94a3b8; margin-bottom: 20px;"></i>
                <div style="color: #64748b; font-size: 16px;">暂无学习数据</div>
                <div style="color: #94a3b8; font-size: 13px; margin-top: 8px;">完成作业后会自动生成学习分析</div>
            </div>
        `;
        return;
    }

    // 辅助函数：获取作业满分
    function getHomeworkTotalScore(homeworkTitle) {
        const homework = homeworkListAll.find(h => h.title === homeworkTitle);
        if (!homework) return 100; // 默认100分
        
        // 优先使用作业设置的总分
        if (homework.totalScore && homework.totalScore > 0) return homework.totalScore;
        
        // 如果有题目列表，计算各题分值之和
        if (homework.questions && homework.questions.length > 0) {
            return homework.questions.reduce((sum, q) => sum + (q.score || 0), 0);
        }
        
        return 100;
    }
    
    // 辅助函数：获取学生得分（百分比）
    function getStudentScorePercentage(record) {
        const studentScore = record.totalScore || record.total_score || record.score || 0;
        const homeworkTotal = getHomeworkTotalScore(record.homeworkTitle);
        if (homeworkTotal === 0) return 0;
        return (studentScore / homeworkTotal) * 100;
    }
    
    // 辅助函数：获取学生实际得分
    function getStudentScore(record) {
        return record.totalScore || record.total_score || record.score || 0;
    }

    // ========== 基于实际作业满分计算各维度能力得分 ==========
    let syntaxScores = [], logicScores = [], standardScores = [], knowledgeScores = [];
    let syntaxCount = 0, logicCount = 0, standardCount = 0, knowledgeCount = 0;
    let allScores = []; // 存储所有作业的百分比得分
    
    myRecords.forEach(record => {
        const homeworkTotal = getHomeworkTotalScore(record.homeworkTitle);
        const studentScore = getStudentScore(record);
        const percentage = homeworkTotal > 0 ? (studentScore / homeworkTotal) * 100 : 0;
        allScores.push(percentage);
        
        // 优先使用AI批改的维度数据（维度得分也是基于百分比的）
        if (record.dimensions) {
            // 维度得分已经是满分100分制，直接使用
            if (record.dimensions.syntax?.score !== undefined && record.dimensions.syntax?.max) {
                // 如果AI返回了max值，按百分比转换
                const max = record.dimensions.syntax.max || 30;
                const syntaxPercent = (record.dimensions.syntax.score / max) * 100;
                syntaxScores.push(syntaxPercent);
                syntaxCount++;
            } else if (record.dimensions.syntax?.score !== undefined) {
                // 假设满分100
                syntaxScores.push(record.dimensions.syntax.score);
                syntaxCount++;
            }
            
            if (record.dimensions.logic?.score !== undefined && record.dimensions.logic?.max) {
                const max = record.dimensions.logic.max || 30;
                const logicPercent = (record.dimensions.logic.score / max) * 100;
                logicScores.push(logicPercent);
                logicCount++;
            } else if (record.dimensions.logic?.score !== undefined) {
                logicScores.push(record.dimensions.logic.score);
                logicCount++;
            }
            
            if (record.dimensions.standard?.score !== undefined && record.dimensions.standard?.max) {
                const max = record.dimensions.standard.max || 20;
                const standardPercent = (record.dimensions.standard.score / max) * 100;
                standardScores.push(standardPercent);
                standardCount++;
            } else if (record.dimensions.standard?.score !== undefined) {
                standardScores.push(record.dimensions.standard.score);
                standardCount++;
            }
            
            if (record.dimensions.knowledge?.score !== undefined && record.dimensions.knowledge?.max) {
                const max = record.dimensions.knowledge.max || 20;
                const knowledgePercent = (record.dimensions.knowledge.score / max) * 100;
                knowledgeScores.push(knowledgePercent);
                knowledgeCount++;
            } else if (record.dimensions.knowledge?.score !== undefined) {
                knowledgeScores.push(record.dimensions.knowledge.score);
                knowledgeCount++;
            }
        }
        
        // 如果没有维度数据，根据作业总分的百分比和各题得分估算
        if (!record.dimensions || Object.keys(record.dimensions).length === 0) {
            // 根据作业类型推断维度权重
            let syntaxWeight = 0.3, logicWeight = 0.3, standardWeight = 0.2, knowledgeWeight = 0.2;
            
            // 如果有各题得分，更精确地计算维度得分
            if (record.questionScores && record.questionScores.length > 0) {
                // 根据题型判断维度侧重
                let syntaxCountInQ = 0, logicCountInQ = 0, standardCountInQ = 0, knowledgeCountInQ = 0;
                
                record.questionScores.forEach(qs => {
                    const qContent = (qs.questionContent || '').toLowerCase();
                    if (qContent.includes('语法') || qContent.includes('基础') || qs.type === 'choice') {
                        syntaxCountInQ++;
                    }
                    if (qContent.includes('逻辑') || qContent.includes('算法') || qContent.includes('分析')) {
                        logicCountInQ++;
                    }
                    if (qContent.includes('规范') || qContent.includes('格式')) {
                        standardCountInQ++;
                    }
                    if (qContent.includes('知识点') || qContent.includes('概念')) {
                        knowledgeCountInQ++;
                    }
                });
                
                const totalQ = record.questionScores.length;
                if (totalQ > 0) {
                    syntaxWeight = (syntaxCountInQ / totalQ) * 0.5 + 0.2;
                    logicWeight = (logicCountInQ / totalQ) * 0.5 + 0.2;
                    standardWeight = (standardCountInQ / totalQ) * 0.4 + 0.1;
                    knowledgeWeight = (knowledgeCountInQ / totalQ) * 0.4 + 0.1;
                    
                    // 归一化
                    const sum = syntaxWeight + logicWeight + standardWeight + knowledgeWeight;
                    syntaxWeight /= sum;
                    logicWeight /= sum;
                    standardWeight /= sum;
                    knowledgeWeight /= sum;
                }
            }
            
            syntaxScores.push(percentage * syntaxWeight);
            logicScores.push(percentage * logicWeight);
            standardScores.push(percentage * standardWeight);
            knowledgeScores.push(percentage * knowledgeWeight);
            syntaxCount++;
            logicCount++;
            standardCount++;
            knowledgeCount++;
        }
    });
    
    // 计算各维度平均百分比得分
    const avgSyntax = syntaxScores.length > 0 ? Math.round(syntaxScores.reduce((a,b) => a+b, 0) / syntaxScores.length) : 0;
    const avgLogic = logicScores.length > 0 ? Math.round(logicScores.reduce((a,b) => a+b, 0) / logicScores.length) : 0;
    const avgStandard = standardScores.length > 0 ? Math.round(standardScores.reduce((a,b) => a+b, 0) / standardScores.length) : 0;
    const avgKnowledge = knowledgeScores.length > 0 ? Math.round(knowledgeScores.reduce((a,b) => a+b, 0) / knowledgeScores.length) : 0;
    
    // 计算整体平均分（百分比）
    const overallAvgPercentage = allScores.length > 0 ? Math.round(allScores.reduce((a,b) => a+b, 0) / allScores.length) : 0;
    
    // ========== 计算各章节掌握度（基于实际作业满分）==========
    const chapterMastery = CHAPTERS.map(ch => {
        const chapterNodes = KNOWLEDGE_TREE[ch.id - 1].children;
        let totalPercentage = 0;
        let validCount = 0;
        
        chapterNodes.forEach(node => {
            let nodeTotalPercent = 0;
            let nodeCount = 0;
            myRecords.forEach(record => {
                const homework = homeworkListAll.find(h => h.title === record.homeworkTitle);
                if (homework && homework.knowledge_tag && homework.knowledge_tag.includes(node.name)) {
                    const studentScore = getStudentScore(record);
                    const homeworkTotal = getHomeworkTotalScore(record.homeworkTitle);
                    const percentage = homeworkTotal > 0 ? (studentScore / homeworkTotal) * 100 : 0;
                    nodeTotalPercent += percentage;
                    nodeCount++;
                }
            });
            if (nodeCount > 0) {
                totalPercentage += nodeTotalPercent / nodeCount;
                validCount++;
            }
        });
        
        return {
            name: ch.name,
            value: validCount > 0 ? Math.round(totalPercentage / validCount) : 0
        };
    });
    
    // ========== 计算知识点强弱（基于实际作业满分）==========
    const knowledgeStats = {};
    
    myRecords.forEach(record => {
        const homework = homeworkListAll.find(h => h.title === record.homeworkTitle);
        if (homework && homework.knowledge_tag) {
            const tags = homework.knowledge_tag.split(',').map(t => t.trim());
            const studentScore = getStudentScore(record);
            const homeworkTotal = getHomeworkTotalScore(record.homeworkTitle);
            const percentage = homeworkTotal > 0 ? (studentScore / homeworkTotal) * 100 : 0;
            const weakPoints = record.weakPoints || [];
            const knowledgeMastery = record.knowledgeMastery || {};
            
            tags.forEach(tag => {
                if (!knowledgeStats[tag]) {
                    knowledgeStats[tag] = {
                        totalPercentage: 0,
                        count: 0,
                        weakCount: 0,
                        percentages: []
                    };
                }
                knowledgeStats[tag].totalPercentage += percentage;
                knowledgeStats[tag].count++;
                knowledgeStats[tag].percentages.push(percentage);
                
                // 检查该知识点是否被标记为薄弱（根据百分比判断）
                if (percentage < 60) {
                    knowledgeStats[tag].weakCount++;
                }
                if (weakPoints.includes(tag)) {
                    knowledgeStats[tag].weakCount++;
                }
                if (knowledgeMastery[tag] && knowledgeMastery[tag].isWeak === true) {
                    knowledgeStats[tag].weakCount++;
                }
            });
        }
    });
    
    // 计算每个知识点的掌握度（百分比）
    const knowledgeMasteryList = [];
    for (let [tag, stats] of Object.entries(knowledgeStats)) {
        const avgPercentage = Math.round(stats.totalPercentage / stats.count);
        // 掌握度 = 平均百分比 - 薄弱次数惩罚（每次薄弱减5分）
        let mastery = avgPercentage - (stats.weakCount * 5);
        mastery = Math.min(100, Math.max(30, mastery));
        
        knowledgeMasteryList.push({
            name: tag,
            mastery: mastery,
            avgPercentage: avgPercentage,
            count: stats.count,
            weakCount: stats.weakCount,
            isWeak: mastery < 60 || avgPercentage < 60 || stats.weakCount > stats.count / 2
        });
    }
    
    // 排序
    const sortedByMastery = [...knowledgeMasteryList].sort((a, b) => b.mastery - a.mastery);
    const top3 = sortedByMastery.filter(k => k.mastery >= 70).slice(0, 3);
    const bottom3 = sortedByMastery.filter(k => k.mastery < 70 || k.isWeak).sort((a, b) => a.mastery - b.mastery).slice(0, 3);
    
    // 生成最强知识点HTML
    let topHtml = '';
    if (top3.length > 0) {
        topHtml = top3.map((k, i) => {
            let color = k.mastery >= 80 ? '#10b981' : k.mastery >= 60 ? '#3b82f6' : '#f59e0b';
            return `
                <div style="display: flex; align-items: center; margin-bottom: 16px;">
                    <div style="width: 28px; height: 28px; border-radius: 28px; background: ${color}15; display: flex; align-items: center; justify-content: center; margin-right: 14px; color: ${color}; font-weight: 600;">${i+1}</div>
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span style="color: #1e2a3a;">${k.name}</span>
                            <span style="color: ${color}; font-weight: 500;">${k.mastery}分</span>
                        </div>
                        <div class="mastery-progress" style="height: 6px;">
                            <div class="mastery-fill" style="width: ${k.mastery}%; background: ${color};"></div>
                        </div>
                        <div style="font-size: 11px; color: #8b9eb0; margin-top: 4px;">平均正确率 ${k.avgPercentage}% (${k.count}次作业)</div>
                    </div>
                </div>
            `;
        }).join('');
    } else {
        topHtml = '<div style="color: #8b9eb0; padding: 20px; text-align: center;">暂无数据</div>';
    }
    
    // 生成薄弱知识点HTML
    let bottomHtml = '';
    if (bottom3.length > 0) {
        bottomHtml = bottom3.map((k, i) => {
            return `
                <div style="display: flex; align-items: center; margin-bottom: 16px;">
                    <div style="width: 28px; height: 28px; border-radius: 28px; background: #fee2e2; display: flex; align-items: center; justify-content: center; margin-right: 14px; color: #ef4444; font-weight: 600;">${i+1}</div>
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span style="color: #1e2a3a;">${k.name}</span>
                            <span style="color: #ef4444; font-weight: 500;">${k.mastery}分</span>
                        </div>
                        <div class="mastery-progress" style="height: 6px;">
                            <div class="mastery-fill poor" style="width: ${k.mastery}%;"></div>
                        </div>
                        <div style="font-size: 11px; color: #8b9eb0; margin-top: 4px;">
                            平均正确率 ${k.avgPercentage}% | ${k.weakCount > 0 ? `${k.weakCount}次薄弱` : '需加强'}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    } else if (knowledgeMasteryList.length > 0) {
        bottomHtml = '<div style="color: #10b981; padding: 20px; text-align: center;">🎉 所有知识点掌握良好，继续保持！</div>';
    } else {
        bottomHtml = '<div style="color: #8b9eb0; padding: 20px; text-align: center;">完成作业后显示薄弱知识点</div>';
    }

    // 生成学习建议（基于实际表现）
    const weakNames = bottom3.map(k => k.name);
    let adviceText = '';
    if (weakNames.length > 0) {
        adviceText = `建议重点复习：${weakNames.slice(0, 3).join('、')}，多做相关练习巩固基础。`;
    } else if (top3.length > 0) {
        adviceText = `您在${top3.slice(0, 2).map(k => k.name).join('、')}等知识点表现优秀，可以尝试挑战更难的题目。`;
    } else {
        adviceText = '继续保持学习节奏，每天进步一点点。';
    }
    
    // 根据实际得分判断能力等级
    function getAbilityLevel(percent) {
        if (percent >= 85) return { text: '优秀', color: '#10b981', class: 'high' };
        if (percent >= 70) return { text: '良好', color: '#3b82f6', class: 'medium' };
        if (percent >= 55) return { text: '中等', color: '#f59e0b', class: 'low' };
        return { text: '待加强', color: '#ef4444', class: 'poor' };
    }

    let html = `
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">完成作业数</div>
                <div class="stat-value">${myRecords.length}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均得分率</div>
                <div class="stat-value" style="color: ${overallAvgPercentage >= 85 ? '#10b981' : overallAvgPercentage >= 70 ? '#3b82f6' : overallAvgPercentage >= 55 ? '#f59e0b' : '#ef4444'};">${overallAvgPercentage}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高得分率</div>
                <div class="stat-value" style="color: #10b981;">${Math.max(...allScores).toFixed(0)}%</div>
            </div>
        </div>

        <div class="analysis-grid">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-chart-radar"></i>
                    能力维度分析
                </div>
                <div id="radarChart" class="radar-chart-container" style="height: 320px;"></div>
                <div style="display: flex; justify-content: center; gap: 24px; margin-top: 16px; font-size: 11px; color: #8b9eb0;">
                    <span>📊 基于 ${myRecords.length} 次作业</span>
                    <span>📈 各维度按正确率%计算</span>
                </div>
            </div>
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-trophy"></i>
                    知识点强弱分析
                </div>
                <div style="margin-bottom: 24px;">
                    <div style="color: #5b6e8c; margin-bottom: 16px; font-size: 13px; font-weight: 500;">💪 掌握较好的知识点</div>
                    ${topHtml}
                </div>
                <div>
                    <div style="color: #5b6e8c; margin-bottom: 16px; font-size: 13px; font-weight: 500;">📌 需要加强的知识点</div>
                    ${bottomHtml}
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fas fa-chart-bar"></i>
                章节掌握度分析
            </div>
            <div id="chapterChart" style="height: 280px;"></div>
        </div>

        <div class="card" style="background: #f8fafc;">
            <div class="card-title">
                <i class="fas fa-lightbulb"></i>
                学习建议
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                <div>
                    <div style="font-weight: 500; margin-bottom: 12px; color: #1e2a3a;">📊 能力提升建议</div>
                    <div style="color: #5b6e8c; font-size: 14px; line-height: 1.6;">
                        ${avgSyntax < 70 ? '• 语法基础：建议多练习基础语法，注意括号匹配和分号\n' : '• 语法基础：掌握良好 ✓\n'}
                        ${avgLogic < 70 ? '• 逻辑思维：建议多做算法题，培养编程思维\n' : '• 逻辑思维：掌握良好 ✓\n'}
                        ${avgStandard < 70 ? '• 代码规范：注意命名规范和代码缩进\n' : '• 代码规范：掌握良好 ✓\n'}
                        ${avgKnowledge < 70 ? '• 知识点运用：建议复习相关概念，多做练习\n' : '• 知识点运用：掌握良好 ✓\n'}
                        ${avgSyntax >= 70 && avgLogic >= 70 && avgStandard >= 70 && avgKnowledge >= 70 ? '• 各项能力均衡，可以挑战综合项目' : ''}
                    </div>
                </div>
                <div>
                    <div style="font-weight: 500; margin-bottom: 12px; color: #1e2a3a;">🎯 当前阶段建议</div>
                    <div style="color: #5b6e8c; font-size: 14px; line-height: 1.6;">
                        ${adviceText}
                    </div>
                    <div style="margin-top: 16px; padding: 12px; background: #f1f5f9; border-radius: 12px;">
                        <div style="font-size: 12px; color: #3b82f6;">📈 最近作业趋势（得分率）</div>
                        <div style="font-size: 13px; margin-top: 4px;">
                            ${myRecords.slice(-5).map(r => {
                                const percentage = getStudentScorePercentage(r);
                                const color = percentage >= 85 ? '#10b981' : percentage >= 70 ? '#3b82f6' : percentage >= 55 ? '#f59e0b' : '#ef4444';
                                return `<span style="color: ${color}; font-weight: 500;">${Math.round(percentage)}%</span>`;
                            }).join(' → ')}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.getElementById('content').innerHTML = html;

    // 渲染雷达图（基于实际百分比）
    setTimeout(() => {
        const radarChart = echarts.init(document.getElementById('radarChart'));
        radarChart.setOption({
            radar: {
                indicator: [
                    { name: '语法正确性', max: 100 },
                    { name: '逻辑完整性', max: 100 },
                    { name: '代码规范', max: 100 },
                    { name: '知识点运用', max: 100 }
                ],
                center: ['50%', '50%'],
                radius: '65%',
                name: { textStyle: { color: '#5b6e8c', fontSize: 11 } },
                splitArea: { areaStyle: { color: ['rgba(59,130,246,0.02)', 'rgba(59,130,246,0.04)'] } }
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {

                }
            },
            series: [{
                type: 'radar',
                data: [{
                    value: [avgSyntax, avgLogic, avgStandard, avgKnowledge],
                    name: '我的能力',
                    areaStyle: { 
                        color: 'rgba(59,130,246,0.2)',
                        shadowBlur: 10,
                        shadowColor: 'rgba(59,130,246,0.3)'
                    },
                    lineStyle: { color: '#3b82f6', width: 2 },
                    itemStyle: { color: '#3b82f6', borderColor: '#fff', borderWidth: 2 }
                }]

        const chapterChart = echarts.init(document.getElementById('chapterChart'));
        chapterChart.setOption({
            tooltip: { 
                trigger: 'axis', 
                axisPointer: { type: 'shadow' },

            xAxis: {
                type: 'category',
                data: chapterMastery.map(c => c.name.replace('第', '').replace('章', '').substring(0, 6)),
                axisLabel: { rotate: 15, fontSize: 11, interval: 0 }
            },

                type: 'value', 
                max: 100, 
                name: '掌握率 (%)', 
                axisLabel: { formatter: '{value}%' } 
            },
            series: [{
                data: chapterMastery.map(c => c.value),
                type: 'bar',
                barWidth: 28,
                itemStyle: {
                    borderRadius: [6, 6, 0, 0],

                        const value = params.data;
                        if (value >= 85) return '#10b981';
                        if (value >= 70) return '#3b82f6';
                        if (value >= 55) return '#f59e0b';

                    }
                },
                label: { 
                    show: true, 
                    position: 'top', 
                    formatter: '{c}%', 
                    fontSize: 10,
                    color: '#5b6e8c'
                }
            }]
        });
    }, 100);
}

        // ==================== 解析文档内容 ====================
        async function parseDocument(file) {
            const fileName = file.name.toLowerCase();
            const fileExt = fileName.split('.').pop();
            
            return new Promise(async (resolve, reject) => {
                try {
                    let text = '';
                    
                    if (fileExt === 'txt') {
                        text = await file.text();
                    } 
                    else if (fileExt === 'pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            const strings = content.items.map(item => item.str);
                            fullText += strings.join(' ') + '\n';
                        }
                        text = fullText;
                    }
                    else if (fileExt === 'docx' || fileExt === 'doc') {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        text = result.value;
                    }
                    else {
                        text = await file.text();
                    }
                    
                    resolve(text);
                } catch (error) {
                    console.error('文档解析失败:', error);
                    reject(error);
                }
            });
        }

封装是将数据和方法包装在类内部，隐藏内部实现细节，只对外提供公共接口。这样可以提高代码的安全性和可维护性。

继承允许一个类（子类）继承另一个类（父类）的属性和方法，实现代码复用。Java中使用extends关键字实现继承。

多态是指同一操作作用于不同的对象，可以有不同的解释和执行结果。多态分为编译时多态（方法重载）和运行时多态（方法重写）。

接口是一种抽象类型，它定义了一组抽象方法，类通过实现接口来遵循这些规范。接口支持多重实现，弥补了Java单继承的不足。`;

        function simpleTokenize(text) {
            const words = text.match(/[\u4e00-\u9fa5]+|[a-zA-Z]+/g) || [];

        async function extractKeywords() {
            const textInput = document.getElementById('nlpText');
            const resultArea = document.getElementById('nlpResult');
            let text = textInput.value.trim();
            
            if (currentNLPFile) {
                resultArea.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>正在解析文档: ${currentNLPFile.name}...</span>
                    </div>
                `;
                
                try {
                    text = await parseDocument(currentNLPFile);
                    textInput.value = text;
                } catch (error) {
                    resultArea.innerHTML = `
                        <div style="color: #ef4444; text-align: center; padding: 40px;">
                            <i class="fas fa-exclamation-circle" style="font-size: 40px; margin-bottom: 16px;"></i>
                            <div>文档解析失败</div>
                            <div style="font-size: 12px; margin-top: 8px;">${error.message}</div>
                        </div>
                    `;
                    return;
                }
            }
            
            if (!text) {
                alert('请输入文本或上传文档');
                return;
            }
            
            resultArea.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>正在分析文本内容...</span>
                </div>
            `;
            
            setTimeout(() => {
                try {
                    const words = simpleTokenize(text);
                    
                    const stopWords = new Set([
                        '的', '了', '是', '在', '和', '与', '有', '我', '你', '他', '她', '它',
                        '我们', '你们', '他们', '这个', '那个', '这些', '那些', '这里', '那里',
                        '就', '都', '而', '且', '并', '或', '但', '因为', '所以', '如果', '那么',
                        '地', '得', '着', '过', '吧', '吗', '呢', '啊', '呀', '哇', '哦',
                        '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '百', '千', '万',
                        'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being',
                        'and', 'or', 'but', 'if', 'then', 'else', 'for', 'with', 'without'
                    ]);
                    
                    const wordCount = {};
                    words.forEach(word => {
                        const lowerWord = word.toLowerCase();
                        if (lowerWord.length > 1 && !stopWords.has(lowerWord) && !/^\d+$/.test(lowerWord)) {
                            wordCount[lowerWord] = (wordCount[lowerWord] || 0) + 1;
                        }
                    });
                    
                    const sortedWords = Object.entries(wordCount)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 20);
                    
                    if (sortedWords.length === 0) {
                        resultArea.innerHTML = `
                            <div style="text-align: center; padding: 40px; color: #64748b;">
                                <i class="fas fa-info-circle" style="font-size: 40px; margin-bottom: 16px;"></i>
                                <div>未提取到有效关键词</div>
                                <div style="font-size: 12px; margin-top: 8px;">请尝试输入更多内容</div>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '<div class="word-cloud">';
                    sortedWords.forEach(([word, count]) => {
                        const maxCount = sortedWords[0][1];
                        const minSize = 14;
                        const maxSize = 36;
                        const fontSize = minSize + (count / maxCount) * (maxSize - minSize);
                        
                        html += `<span class="word-item" style="font-size: ${fontSize}px;">${word} (${count})</span>`;
                    });
                    html += '</div>';
                    
                    html += `
                        <div style="margin-top: 20px; padding: 16px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
                            <div style="display: flex; justify-content: space-between; color: #64748b; font-size: 13px;">
                                <span>总词数: ${words.length}</span>
                                <span>不同词: ${Object.keys(wordCount).length}</span>
                                <span>高频词: ${sortedWords.length}</span>
                            </div>
                        </div>
                    `;
                    
                    resultArea.innerHTML = html;
                } catch (error) {
                    console.error('分析失败:', error);
                    resultArea.innerHTML = `
                        <div style="color: #ef4444; text-align: center; padding: 40px;">
                            <i class="fas fa-exclamation-circle" style="font-size: 40px; margin-bottom: 16px;"></i>
                            <div>分析失败</div>
                            <div style="font-size: 12px; margin-top: 8px;">${error.message}</div>
                        </div>
                    `;
                }
            }, 500);
        }

function initStudentPrivateMessages() {

    if (!privateMessages.teachers) privateMessages.teachers = {};
    if (!privateMessages.students) privateMessages.students = {};

    if (studentId && !privateMessages.students[studentId]) {

}

// 修复：获取学生所在班级ID（从 localStorage 同步最新数据）
function getStudentClassId() {
    if (!currentStudent) return null;
    
    // 关键修复：从 studentList 重新获取最新的 classIds
    const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    const freshStudent = studentList.find(s => s.id === currentStudent.id || s.studentId === currentStudent.id);
    
    if (freshStudent) {
        // 更新 currentStudent 的 classIds
        if (freshStudent.classIds && freshStudent.classIds.length > 0) {
            currentStudent.classIds = freshStudent.classIds;
            localStorage.setItem('currentStudent', JSON.stringify(currentStudent));
            return freshStudent.classIds[0];
        }
        if (freshStudent.classId) {
            currentStudent.classId = freshStudent.classId;
            currentStudent.classIds = [freshStudent.classId];
            localStorage.setItem('currentStudent', JSON.stringify(currentStudent));
            return freshStudent.classId;
        }
    }
    
    // 回退到 currentStudent 的属性
    if (currentStudent.classIds && currentStudent.classIds.length > 0) {
        return currentStudent.classIds[0];
    }
    if (currentStudent.classId) {
        return currentStudent.classId;
    }
    
    return null;
}

function getStudentTeachers() {
    const classId = getStudentClassId();
    if (!classId) return [];
    
    const classList = JSON.parse(localStorage.getItem('classList') || '[]');
    const teacherList = JSON.parse(localStorage.getItem('teacherList') || '[]');
    const myClass = classList.find(c => c.id === classId);
    
    if (!myClass || !myClass.teacher_username) return [];
    
    const teacher = teacherList.find(t => t.id === myClass.teacher_username);
    return teacher ? [teacher] : [];

// 学生发送新私信
function sendNewStudentMessage() {
    const teacherId = document.getElementById('newMsgTeacherSelect').value;
    const content = document.getElementById('newMsgContent').value.trim();
    
    if (!teacherId) {
        alert('请选择老师');
        return;
    }
    if (!content) {
        alert('请输入消息内容');
        return;
    }
    
    const privateMessages = JSON.parse(localStorage.getItem('privateMessages') || '{"teachers":{},"students":{}}');
    const studentId = getCurrentStudentId();
    const studentName = getCurrentStudentName();
    
    if (!studentId) {
        alert('无法获取学生信息');
        return;
    }
    
    const message = {
        id: Date.now(),
        senderId: studentId,
        senderName: studentName,
        receiverId: teacherId,
        content: content,
        time: new Date().toLocaleString(),
        timestamp: Date.now(),
        isRead: false
    };
    
    // 保存到学生端
    if (!privateMessages.students[studentId]) privateMessages.students[studentId] = {};
    if (!privateMessages.students[studentId][teacherId]) privateMessages.students[studentId][teacherId] = [];
    privateMessages.students[studentId][teacherId].push(message);
    
    // 保存到教师端
    if (!privateMessages.teachers[teacherId]) privateMessages.teachers[teacherId] = {};
    if (!privateMessages.teachers[teacherId][studentId]) privateMessages.teachers[teacherId][studentId] = [];
    privateMessages.teachers[teacherId][studentId].push(message);
    
    localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
    
    // 发送通知给老师（教师端有自己的通知系统）
    let teacherNotifications = JSON.parse(localStorage.getItem(`notifications_${teacherId}`) || '[]');
    teacherNotifications.unshift({
        id: Date.now() + Math.random(),
        type: 'message',
        title: '📧 学生私信',
        content: `来自 ${studentName}：${content.substring(0, 50)}${content.length > 50 ? '...' : ''}`,
        time: new Date().toLocaleString(),
        isRead: false,
        messageId: message.id,
        studentId: studentId
    });
    localStorage.setItem(`notifications_${teacherId}`, JSON.stringify(teacherNotifications));
    
    // 清空输入框
    document.getElementById('newMsgContent').value = '';
    document.getElementById('newMsgTeacherSelect').value = '';
    
    alert('✅ 私信发送成功！');
    loadStudentMessages(); // 刷新页面
}

// 当前选中的老师ID
let currentChatTeacherId = null;

// 打开与老师的聊天
function openStudentChat(teacherId) {
    currentChatTeacherId = teacherId;
    
    const privateMessages = JSON.parse(localStorage.getItem('privateMessages') || '{"teachers":{},"students":{}}');
    const studentId = getCurrentStudentId();
    const teacherList = JSON.parse(localStorage.getItem('teacherList') || '[]');
    const teacher = teacherList.find(t => t.id === teacherId);
    
    if (!teacher) return;
    if (!studentId) return;
    
    // 获取聊天记录
    const chatHistory = privateMessages.students[studentId]?.[teacherId] || [];
    
    // 标记所有收到的消息为已读
    chatHistory.forEach(msg => {
        if (msg.receiverId === studentId && !msg.isRead) {
            msg.isRead = true;
        }
    });
    localStorage.setItem('privateMessages', JSON.stringify(privateMessages));
    updateStudentMsgBadge();
    
    // 高亮当前选中的联系人
    document.querySelectorAll('.message-contact-item').forEach(el => {
        el.classList.remove('active');
        if (el.getAttribute('data-teacher') === teacherId) {
            el.classList.add('active');
            const badge = el.querySelector('.unread-badge');
            if (badge) badge.remove();
        }
    });
    
    // 生成消息列表HTML
    const messagesHtml = chatHistory.map(msg => `
        <div class="message-bubble ${msg.senderId === studentId ? 'sent' : 'received'}">
            <div>${escapeHtml(msg.content)}</div>
            <div class="message-time">${msg.time}</div>
        </div>
    `).join('');
    
    const chatHtml = `
        <div class="message-header">
            <h4><i class="fas fa-chalkboard-user"></i> ${escapeHtml(teacher.name || teacher.id)}</h4>
            <button class="btn btn-secondary" style="padding: 6px 12px; border-radius: 30px;" onclick="viewStudentSelfAbility()">

            <button class="btn btn-primary" onclick="sendStudentMessage()" style="border-radius: 30px;">
                <i class="fas fa-paper-plane"></i> 发送
            </button>
        </div>
    `;
    
    document.getElementById('studentChatMain').innerHTML = chatHtml;
    
    // 滚动到底部
    setTimeout(() => {
        const msgList = document.getElementById('studentMsgList');
        if (msgList) msgList.scrollTop = msgList.scrollHeight;
    }, 100);
}

// 更新学生端未读消息数量
function updateStudentMsgBadge() {
    const studentId = getCurrentStudentId();
    if (!studentId) return;
    
    const privateMessages = JSON.parse(localStorage.getItem('privateMessages') || '{"teachers":{},"students":{}}');
    const myMessages = privateMessages.students[studentId] || {};
    
    let unreadCount = 0;
    for (let teacherId in myMessages) {
        unreadCount += myMessages[teacherId].filter(m => m.receiverId === studentId && !m.isRead).length;
    }
    
    const badge = document.getElementById('studentMsgBadge');
    if (badge) {
        if (unreadCount > 0) {
            badge.style.display = 'inline-block';
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
        } else {
            badge.style.display = 'none';
        }
    }
}


// ==================== 学生个人能力画像 ====================
function viewStudentSelfAbility() {
    const studentId = getCurrentStudentId();
    if (!studentId) return;
    
    const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    const student = studentList.find(s => (s.studentId === studentId || s.id === studentId));
    const studentName = student?.name || getCurrentStudentName();
    
    const checkedHomework = JSON.parse(localStorage.getItem('checkedHomework') || '[]');
    const submits = checkedHomework.filter(s => s.studentId === studentId);
    
    // 计算各维度能力值
    let syntaxScore = 0, logicScore = 0, standardScore = 0, knowledgeScore = 0, problemScore = 0;
    let count = 0;
    
    submits.forEach(s => {
        if (s.dimensions) {
            syntaxScore += s.dimensions.syntax?.score || 0;
            logicScore += s.dimensions.logic?.score || 0;
            standardScore += s.dimensions.standard?.score || 0;
            knowledgeScore += s.dimensions.knowledge?.score || 0;
            count++;
        } else {
            const total = s.totalScore || s.total_score || s.score || 0;
            syntaxScore += total * 0.3;
            logicScore += total * 0.3;
            standardScore += total * 0.2;
            knowledgeScore += total * 0.2;
            count++;
        }
        problemScore += (s.totalScore || s.total_score || s.score || 0);
    });
    
    if (count > 0) {
        syntaxScore = Math.round(syntaxScore / count);
        logicScore = Math.round(logicScore / count);
        standardScore = Math.round(standardScore / count);
        knowledgeScore = Math.round(knowledgeScore / count);
        problemScore = Math.round(problemScore / count);
    } else {
        syntaxScore = logicScore = standardScore = knowledgeScore = problemScore = 65;
    }
    
    // 获取薄弱知识点
    const weakPoints = getStudentWeakPoints(studentId);
    
    // 计算平均分
    const avgScore = submits.length > 0 
        ? Math.round(submits.reduce((sum, s) => sum + (s.totalScore || s.total_score || s.score || 0), 0) / submits.length) 
        : 0;
    
    const modalContent = `

                </div>
            </div>
            
            <div id="selfAbilityRadar" class="radar-container" style="height: 300px;"></div>
            
            <div class="dimension-tags">
                <div class="dimension-tag ${syntaxScore >= 80 ? 'high' : syntaxScore >= 60 ? 'medium' : 'poor'}">
                    📝 语法能力 <span class="score">${syntaxScore}</span>
                </div>
                <div class="dimension-tag ${logicScore >= 80 ? 'high' : logicScore >= 60 ? 'medium' : 'poor'}">
                    🧠 逻辑思维 <span class="score">${logicScore}</span>
                </div>
                <div class="dimension-tag ${standardScore >= 80 ? 'high' : standardScore >= 60 ? 'medium' : 'poor'}">
                    📐 代码规范 <span class="score">${standardScore}</span>
                </div>
                <div class="dimension-tag ${knowledgeScore >= 80 ? 'high' : knowledgeScore >= 60 ? 'medium' : 'poor'}">
                    📚 知识点掌握 <span class="score">${knowledgeScore}</span>
                </div>
                <div class="dimension-tag ${problemScore >= 80 ? 'high' : problemScore >= 60 ? 'medium' : 'poor'}">
                    💡 问题解决 <span class="score">${problemScore}</span>
                </div>
            </div>
            
            ${weakPoints.length > 0 ? `
                <div style="margin-top: 20px; padding: 16px; background: #fef2f2; border-radius: 16px;">
                    <div style="font-weight: 600; color: #ef4444; margin-bottom: 8px;">⚠️ 需要加强的知识点</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${weakPoints.slice(0, 6).map(p => `<span style="background: #fee2e2; color: #dc2626; padding: 4px 12px; border-radius: 20px; font-size: 12px;">${escapeHtml(p)}</span>`).join('')}
                    </div>
                </div>
            ` : `
                <div style="margin-top: 20px; padding: 16px; background: #dcfce7; border-radius: 16px;">
                    <div style="font-weight: 600; color: #10b981;">✅ 整体表现优秀，继续保持！</div>
                </div>
            `}
            
            <div class="trend-card" style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-size: 14px; opacity: 0.8;">📈 学习建议</div>
                        <div style="font-size: 14px; margin-top: 4px;">${weakPoints.length > 0 ? `重点复习：${weakPoints.slice(0, 3).join('、')}` : '继续保持良好学习习惯'}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 14px; opacity: 0.8;">🎯 推荐练习</div>
                        <div>${weakPoints.length > 0 ? weakPoints[0] : '进阶题目'}</div>

// ==================== 勋章系统 ====================
let studentBadges = JSON.parse(localStorage.getItem(`badges_${getCurrentStudentId()}`) || '[]');

function initStudentBadges() {
    const studentId = getCurrentStudentId();
    if (!studentId) return;
    
    const checkedHomework = JSON.parse(localStorage.getItem('checkedHomework') || '[]');
    const mySubmits = checkedHomework.filter(s => s.studentId === studentId);
    const quizHistoryData = JSON.parse(localStorage.getItem(`quizHistory_${studentId}`) || '[]');
    const correctCount = quizHistoryData.filter(q => q.isCorrect).length;
    const streak = parseInt(localStorage.getItem(`streak_${studentId}`)) || 0;
    
    // 检查是否获得过满分
    const hasPerfectScore = mySubmits.some(s => (s.totalScore || s.total_score || s.score || 0) === 100);
    
    // 检查连续正确
    let continuousCorrect = false;
    const recentQuizzes = quizHistoryData.slice(-5);
    if (recentQuizzes.length >= 5 && recentQuizzes.every(q => q.isCorrect)) {
        continuousCorrect = true;
    }
    
    // 检查知识点掌握数量
    let masteredCount = 0;
    for (let chapter of KNOWLEDGE_TREE) {
        for (let node of chapter.children) {
            if (getMasteryLevel(node.id) >= 80) {
                masteredCount++;
            }
        }
    }
    
    const badges = [
        { id: 'first_homework', name: '🏆 初试锋芒', desc: '完成第一次作业', condition: mySubmits.length >= 1, icon: 'fas fa-rocket', color: '#f59e0b' },
        { id: 'perfect_score', name: '💯 满分学霸', desc: '获得一次满分作业', condition: hasPerfectScore, icon: 'fas fa-star', color: '#ffd700' },
        { id: 'streak_7', name: '⚡ 七连击', desc: '连续学习7天', condition: streak >= 7, icon: 'fas fa-fire', color: '#f97316' },
        { id: 'quiz_master', name: '📚 题库达人', desc: '完成10道题目', condition: quizHistoryData.length >= 10, icon: 'fas fa-brain', color: '#8b5cf6' },
        { id: 'quiz_accurate', name: '🎯 百发百中', desc: '连续答对5题', condition: continuousCorrect, icon: 'fas fa-bullseye', color: '#10b981' },
        { id: 'homework_master', name: '📝 作业达人', desc: '完成5次作业', condition: mySubmits.length >= 5, icon: 'fas fa-pen-fancy', color: '#3b82f6' },
        { id: 'knowledge_strong', name: '🎓 知识渊博', desc: '掌握5个以上知识点(≥80分)', condition: masteredCount >= 5, icon: 'fas fa-graduation-cap', color: '#06b6d4' }
    ];
    
    let newBadgeEarned = false;
    badges.forEach(badge => {
        if (badge.condition && !studentBadges.includes(badge.id)) {
            studentBadges.push(badge.id);
            newBadgeEarned = true;
            showFloatingMessage(`🎉 获得新勋章：${badge.name} 🎉`, '#f59e0b');
        }
    });
    
    localStorage.setItem(`badges_${studentId}`, JSON.stringify(studentBadges));
    if (newBadgeEarned) {
        setTimeout(() => {
            if (document.getElementById('pageTitle').innerHTML.includes('勋章')) {
                loadMyBadges();
            }
        }, 2000);
    }
}

                <i class="fas fa-medal"></i>
                我的勋章墙
                <span style="font-size: 12px; margin-left: auto; color: #64748b;">已获得 ${earnedBadges.length}/${allBadges.length}</span>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                ${earnedBadges.map(b => `
                    <div style="background: linear-gradient(135deg, ${b.color}15, #ffffff); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid ${b.color}40; transition: transform 0.2s;">
                        <div style="font-size: 48px; color: ${b.color}; margin-bottom: 12px;">
                            <i class="${b.icon}"></i>
                        </div>
                        <div style="font-weight: 700; color: #1e293b;">${b.name}</div>
                        <div style="font-size: 11px; color: #64748b; margin-top: 4px;">${b.desc}</div>
                        <div style="margin-top: 8px;"><span style="background: ${b.color}; color: white; padding: 4px 12px; border-radius: 30px; font-size: 11px;">已获得</span></div>
                    </div>
                `).join('')}
                ${lockedBadges.map(b => `
                    <div style="background: #f8fafc; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #e2e8f0; opacity: 0.6;">
                        <div style="font-size: 48px; color: #94a3b8; margin-bottom: 12px;">
                            <i class="${b.icon}"></i>
                        </div>
                        <div style="font-weight: 700; color: #94a3b8;">???</div>
                        <div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">继续努力解锁</div>
                    </div>
                `).join('')}
            </div>
            <div style="margin-top: 24px; padding: 16px; background: #f8fafc; border-radius: 16px; text-align: center;">
                <i class="fas fa-lightbulb" style="color: #f59e0b;"></i>
                <span style="font-size: 13px; color: #64748b; margin-left: 8px;">完成更多学习任务，解锁更多勋章！</span>
            </div>
        </div>
    `;
    
    document.getElementById('content').innerHTML = html;
}

// 浮动消息提示
function showFloatingMessage(msg, color) {
    const div = document.createElement('div');
    div.innerText = msg;
    div.style.cssText = `
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: ${color};
        color: white;
        padding: 12px 24px;
        border-radius: 40px;
        font-weight: bold;
        z-index: 10000;
        animation: fadeOut 2s ease forwards;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    `;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
}


// 导出函数
window.loadStudentMessages = loadStudentMessages;
window.openStudentChat = openStudentChat;
window.sendStudentMessage = sendStudentMessage;
window.viewStudentSelfAbility = viewStudentSelfAbility;
window.loadMyBadges = loadMyBadges;
window.initStudentBadges = initStudentBadges;

    </script>
