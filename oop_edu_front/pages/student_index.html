<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <base href="/pages/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 · OOP智慧教学平台</title>
    <!-- 高级字体 - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Mammoth.js for Word -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", "Microsoft YaHei", sans-serif;
    display: flex;
    height: 100vh;
    background: #f8fafc;
    color: #1e293b;
    overflow: hidden;
    font-weight: 450;
    letter-spacing: -0.3px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
}

        /* ==================== 自定义滚动条 ==================== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* ==================== 侧边栏样式 ==================== */
        .sidebar {
    width: 190px;  
    background: #1e293b;
    color: #fff;
    padding: 32px 0;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
    position: relative;
    z-index: 10;
    height: 100vh;
    overflow-y: auto;
}

        .sidebar-logo {
    text-align: center;
    padding: 0 24px 32px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 16px;
}

.sidebar-logo h3 {
    font-size: 18px;  
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: linear-gradient(135deg, #fff, #60a5fa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.sidebar-logo p {
    font-size: 12px; 
    color: rgba(255, 255, 255, 0.6);
    margin-top: 8px;
    font-weight: 400;
}

        .sidebar-menu {
    flex: 1;
    padding: 0 12px;  
    display: flex;
    flex-direction: column;
    gap: 2px;  
}
        .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;  
    border-radius: 8px;  
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
    color: rgba(255, 255, 255, 0.7);
}
        .menu-item i {
    width: 24px;
    font-size: 18px;  
    text-align: center;  
    color: rgba(255, 255, 255, 0.5);
    transition: all 0.2s ease;
}

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .menu-item:hover i {
            color: #fff;
        }

        .menu-item.active {
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .menu-item.active i {
            color: #fff;
        }

        /* ==================== 主内容区样式 ==================== */
        .main {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            background: #f8fafc;
        }

        /* ==================== 标题样式 ==================== */
        .page-title {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #3b82f6;
            border-radius: 2px;
        }

        .page-title i {
            color: #3b82f6;
            font-size: 24px;
        }

        /* ==================== 卡片样式 ==================== */
        .card {
    background: #ffffff;
    border-radius: 0;  
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(59, 130, 246, 0.15);
    transition: all 0.25s ease;
}
        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            color: #3b82f6;
            font-size: 20px;
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 0;  
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    font-family: "Inter", sans-serif;
}

        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-success {
            background: #10b981;
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* ==================== 头像样式 ==================== */
        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f1f5f9;
            border: 3px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #3b82f6;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .avatar:hover {
            transform: scale(1.05);
            border-color: #8b5cf6;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ==================== 表单样式 ==================== */
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 16px;
            background: #ffffff;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            transition: all 0.2s ease;
            font-family: "Inter", sans-serif;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: #94a3b8;
        }

        .form-select {
            background: #ffffff;
            cursor: pointer;
        }

        /* ==================== 树状知识图谱容器 ==================== */
        .tree-container {
            width: 100%;
            height: 550px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin-top: 16px;
            overflow: hidden;
        }

        /* ==================== 章节标签 ==================== */
        .chapter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .chapter-tab {
            padding: 8px 16px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chapter-tab:hover {
            background: #e2e8f0;
        }

        .chapter-tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }

        /* ==================== 知识点标签 ==================== */
        .knowledge-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin: 0 4px 8px 0;
            transition: all 0.2s ease;
        }

        .knowledge-tag:hover {
            background: #e2e8f0;
        }

        .knowledge-tag .score {
            background: #3b82f6;
            color: #fff;
            padding: 2px 6px;
            border-radius: 16px;
            font-size: 10px;
        }

        /* ==================== 掌握度进度条 ==================== */
        .mastery-progress {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .mastery-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .mastery-fill.high { background: #10b981; }
        .mastery-fill.medium { background: #3b82f6; }
        .mastery-fill.low { background: #f59e0b; }
        .mastery-fill.poor { background: #ef4444; }

        /* ==================== 作业卡片 ==================== */
        .homework-item {
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .homework-item:hover {
            background: #f1f5f9;
        }

        .homework-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .homework-meta {
            display: flex;
            gap: 20px;
            color: #64748b;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .homework-meta i {
            color: #3b82f6;
            margin-right: 4px;
        }

        /* 作业提交记录样式 */
        .submission-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .submission-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .submission-student {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .submission-avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: #eff6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 18px;
            font-weight: 600;
        }

        .submission-info h4 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .submission-info p {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .submission-score {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
        }

        .submission-score.high { color: #10b981; }
        .submission-score.medium { color: #3b82f6; }
        .submission-score.low { color: #f59e0b; }
        .submission-score.poor { color: #ef4444; }

        .submission-code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 12px 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .submission-code pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .submission-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            color: #94a3b8;
        }

        /* 文档卡片样式 - 支持课件预览 */
        .document-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .document-item:hover {
            background: #f8fafc;
            border-radius: 12px;
        }

        .document-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .document-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .document-icon.pdf { background: #fee2e2; color: #ef4444; }
        .document-icon.ppt { background: #fed7aa; color: #f59e0b; }
        .document-icon.word { background: #dbeafe; color: #3b82f6; }
        .document-icon.default { background: #eff6ff; color: #3b82f6; }

        .document-name {
            font-size: 15px;
            color: #1e293b;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .document-meta {
            font-size: 12px;
            color: #64748b;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .document-actions {
            display: flex;
            gap: 8px;
        }

        .doc-btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #475569;
            transition: all 0.2s;
        }

        .doc-btn:hover {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }

        /* 预览内容样式 */
        .preview-pdf {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 12px;
        }
        
        .preview-iframe {
            width: 100%;
            height: 500px;
            border: none;
            background: #fff;
            border-radius: 12px;
        }
        
        .preview-text {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
            max-height: 500px;
            overflow-y: auto;
        }

        /* 视频卡片 */
        .video-card {
            display: flex;
            gap: 20px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        .video-card:hover {
            background: #f1f5f9;
        }

        .video-thumbnail {
            width: 160px;
            height: 90px;
            background: #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .video-thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-thumbnail:hover .play-icon {
            opacity: 1;
        }

        /* ==================== 模态框 ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 28px;
            animation: modalFadeIn 0.2s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-lg {
            max-width: 900px;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
            color: #1e293b;
            font-weight: 600;
        }

        .close-modal {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: #f1f5f9;
            border: none;
            color: #64748b;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* ==================== AI批改结果 ==================== */
        .ai-result {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            margin: 16px 0;
        }

        .ai-score {
            font-size: 48px;
            font-weight: 600;
            text-align: center;
            margin: 16px 0;
            color: #3b82f6;
        }

        .dimension-item {
            margin: 16px 0;
            padding: 16px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .dimension-name {
            color: #1e293b;
            font-weight: 500;
        }

        .dimension-score {
            color: #3b82f6;
            font-weight: 600;
        }

        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .issue-list {
            margin-top: 8px;
            padding-left: 20px;
            color: #ef4444;
            font-size: 13px;
        }

        .suggestion-item {
            padding: 10px 15px;
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 13px;
        }

        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .feedback-box {
            background: #eff6ff;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }

        /* ==================== 统计卡片 ==================== */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
    background: #f8fafc;
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 0;  
    padding: 20px;
    transition: all 0.2s;
}

        .stat-label {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #1e293b;
        }

        /* ==================== 加载动画 ==================== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            color: #3b82f6;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==================== 文件上传区域 ==================== */
        .file-upload-area {
            margin: 16px 0;
            padding: 30px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;

}

        .agent-clear-btn {

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .ranking-table th {
            text-align: left;

        .score-poor { color: #ef4444; font-weight: 600; }

        /* ==================== 响应式 ==================== */
        @media (max-width: 1200px) {
            .analysis-grid {
                grid-template-columns: 1fr;

        }

            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 300px;
            }
            .main {
                padding: 20px;
            }
            .stat-grid {
                grid-template-columns: 1fr;
            }
            .agent-chat-container {
                width: 300px;
                right: 10px;
                bottom: 10px;
            }
        }

        // ==================== IndexedDB 课件存储 ====================
        const DB_NAME = 'OOP_CoursewareDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'courseware';

        let db = null;

        // 打开/创建 IndexedDB 数据库
        function openCoursewareDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) {
                    resolve(db);
                    return;
                }
                
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = (event) => {
                    console.error('IndexedDB 打开失败:', event.target.error);
                    reject(event.target.error);
                };
                
                request.onsuccess = (event) => {
                    db = event.target.result;
                    console.log('IndexedDB 打开成功');
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;

        async function sendAgentMessage() {
            const input = document.getElementById('agentInput');
            const question = input.value.trim();
            const sendBtn = document.getElementById('agentSendBtn');
            
            if (!question) return;
            
            addAgentMessage(question, true);
            input.value = '';
            sendBtn.disabled = true;
            
            showTypingIndicator();
            
            try {
                const systemPrompt = `你是一个C++编程学习助手，名叫"小O"。你的主要任务是：
1. 帮助学生理解面向对象编程概念（类、对象、继承、多态、封装、虚函数等）

请用中文回答，保持友好、耐心的态度。`;

                const response = await callZhipuAPI([
                    {"role": "system", "content": systemPrompt},
                    {"role": "user", "content": question}
                ], 0.7, 2000);

                hideTypingIndicator();

                if (response.success) {
                    addAgentMessage(response.content, false);
                    
                    const suggestions = generateSuggestions(question);
                    if (suggestions.length > 0) {
                        setTimeout(() => {
                            addSuggestionButtons(suggestions);
                        }, 500);
                    }
                } else {
                    addAgentMessage(`抱歉，我现在无法回答这个问题。错误原因：${response.error}\n建议您稍后再试。`, false);
                }
            } catch (error) {
                hideTypingIndicator();
                addAgentMessage(`出错了：${error.message}`, false);
            }
            
            sendBtn.disabled = false;
        }

        function generateSuggestions(question) {
            const q = question.toLowerCase();
            
            if (q.includes('多态') || q.includes('polymorphism')) {
                return ['虚函数原理', '重载与重写区别', '抽象类示例'];
            } else if (q.includes('继承') || q.includes('inheritance')) {
                return ['public继承', '多继承', '虚基类'];
            } else if (q.includes('指针') || q.includes('pointer')) {
                return ['智能指针', '引用', '动态内存'];
            } else if (q.includes('构造') || q.includes('析构')) {
                return ['拷贝构造', '移动语义', 'RAII原则'];
            } else if (q.includes('虚函数') || q.includes('virtual')) {
                return ['纯虚函数', '抽象类', '动态联编'];
            } else if (q.includes('类') || q.includes('class')) {
                return ['构造函数', '析构函数', '静态成员', '友元'];
            } else {

            }
        }

// ==================== 查看作业详情（基于实际作业总分，动态计算薄弱知识点） ====================
function viewGradeDetail(title) {
    const checkedHomework = JSON.parse(localStorage.getItem("checkedHomework") || "[]");
    const record = checkedHomework.find(h => h.studentId === currentStudent.id && h.homeworkTitle === title);
    const homeworkListAll = JSON.parse(localStorage.getItem("homeworkList") || "[]");
    
    if (!record) {
        alert('找不到作业详情记录');
        return;
    }
    
    // 获取作业信息
    const homework = homeworkListAll.find(h => h.title === title);
    
    // ========== 辅助函数：获取作业总分 ==========
    function getHomeworkTotalScore(hw) {
        if (!hw) return 100;
        if (hw.totalScore && hw.totalScore > 0) return hw.totalScore;
        if (hw.questions && hw.questions.length > 0) {
            return hw.questions.reduce((sum, q) => sum + (q.score || 0), 0);
        }
        return 100;
    }
    
    // ========== 辅助函数：获取学生得分 ==========
    function getStudentScore(rec) {
        if (rec.totalScore !== undefined && rec.totalScore !== null) return rec.totalScore;
        if (rec.total_score !== undefined && rec.total_score !== null) return rec.total_score;
        if (rec.score !== undefined && rec.score !== null) return rec.score;
        return 0;
    }
    
    // ========== 获取当前作业信息 ==========
    const totalScore = getHomeworkTotalScore(homework);
    const studentScore = getStudentScore(record);
    const scoreRate = totalScore > 0 ? (studentScore / totalScore) * 100 : 0;
    
    // 根据得分率确定颜色和状态
    let scoreColor = scoreRate >= 90 ? '#10b981' : scoreRate >= 75 ? '#3b82f6' : scoreRate >= 60 ? '#f59e0b' : '#ef4444';
    let scoreBg = scoreRate >= 90 ? '#e6f7e6' : scoreRate >= 75 ? '#e6f0ff' : scoreRate >= 60 ? '#fff4e6' : '#fee2e2';
    let scoreIcon = scoreRate >= 90 ? '🎉' : scoreRate >= 75 ? '👍' : scoreRate >= 60 ? '📖' : '💪';
    let scoreText = scoreRate >= 90 ? '优秀' : scoreRate >= 75 ? '良好' : scoreRate >= 60 ? '及格' : '待提高';
    
    // ========== 计算学生所有作业中每个知识点的掌握度（基于实际得分率） ==========
    const allHomeworkList = JSON.parse(localStorage.getItem("homeworkList") || "[]");
    const studentAllRecords = checkedHomework.filter(h => h.studentId === currentStudent.id);
    
    // 获取所有知识点名称
    const allKnowledgeNames = PPT_KNOWLEDGE_NODES.map(n => n.name).filter((v, i, a) => a.indexOf(v) === i);
    
    // 初始化知识点统计
    const knowledgeStats = {};
    allKnowledgeNames.forEach(name => {
        knowledgeStats[name] = {
            totalScore: 0,      // 总得分率累加
            count: 0,           // 出现次数
            weakCount: 0,       // 薄弱次数（得分率 < 60%）
            scores: []          // 每次得分率记录
        };
    });
    
    // 遍历学生所有批改记录，统计每个知识点的得分率
    studentAllRecords.forEach(record => {
        const hw = allHomeworkList.find(h => h.title === record.homeworkTitle);
        if (hw && hw.knowledge_tag) {
            const tags = hw.knowledge_tag.split(',').map(t => t.trim());
            const hwTotalScore = getHomeworkTotalScore(hw);
            const stuScore = getStudentScore(record);
            const rate = hwTotalScore > 0 ? (stuScore / hwTotalScore) * 100 : 0;
            
            tags.forEach(tag => {
                if (knowledgeStats[tag]) {
                    knowledgeStats[tag].totalScore += rate;
                    knowledgeStats[tag].count++;
                    knowledgeStats[tag].scores.push(rate);
                    if (rate < 60) {
                        knowledgeStats[tag].weakCount++;
                    }
                }
            });
        }
    });
    
    // 计算每个知识点的最终掌握度和薄弱程度
    const knowledgeMastery = {};
    const weakPointsList = [];
    
    for (let [name, stats] of Object.entries(knowledgeStats)) {
        if (stats.count > 0) {
            const avgRate = stats.totalScore / stats.count;
            const weakRate = stats.weakCount / stats.count;
            
            knowledgeMastery[name] = {
                avgScore: Math.round(avgRate),
                weakRate: Math.round(weakRate * 100),
                count: stats.count,
                weakCount: stats.weakCount,
                isWeak: avgRate < 60 || weakRate > 0.3  // 平均得分率<60% 或 薄弱次数>30%
            };
            
            if (knowledgeMastery[name].isWeak) {
                weakPointsList.push({
                    name: name,
                    avgScore: Math.round(avgRate),
                    weakRate: Math.round(weakRate * 100),
                    count: stats.count
                });
            }
        }
    }
    
    // 按薄弱程度排序（薄弱率高的排前面）

// ==================== 获取当前学生 ====================
function getCurrentStudent() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (!currentUser || currentUser.role !== 'student') {
        return null;
    }
    
    const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    let student = studentList.find(s => s.studentId === currentUser.username || s.id === currentUser.username);
    
    if (student) {
        return {
            id: student.studentId || student.id,
            name: student.name || currentUser.name || '学生',
            classIds: student.classIds || [],  // 改为数组
            avatar: student.avatar || null
        };
    }
    
    const newStudent = {
        id: currentUser.username,
        name: currentUser.name || '学生',
        classIds: [],  // 初始为空数组
        avatar: null
    };
    
    studentList.push({
        id: newStudent.id,
        studentId: newStudent.id,
        name: newStudent.name,
        classIds: newStudent.classIds,  // 存储数组
        avatar: newStudent.avatar
    });
    localStorage.setItem('studentList', JSON.stringify(studentList));
    
    return newStudent;
}

    return true;
}

            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getMasteryLevel(knowledgeId) {

            const masteryData = JSON.parse(localStorage.getItem(key) || '{}');
            const errorCount = masteryData[knowledgeId] || 0;
            return Math.max(30, 100 - errorCount * 8);
        }

        function getNodeColor(level) {
            if (level >= 80) return '#10b981';
            if (level >= 60) return '#3b82f6';
            if (level >= 40) return '#f59e0b';
            return '#ef4444';

        function loadKnowledgeGraph() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-sitemap"></i> 知识图谱';

            let tabsHtml = '<div class="chapter-tabs">';
            CHAPTERS.forEach(ch => {
                tabsHtml += `<div class="chapter-tab ${ch.id === currentChapter ? 'active' : ''}" onclick="switchChapter(${ch.id})">${ch.name}</div>`;
            });
            tabsHtml += '</div>';

            let html = `
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-sitemap"></i>
                        OOP知识树（颜色代表掌握度）
                    </div>
                    ${tabsHtml}
                    <div id="knowledgeTree" class="tree-container"></div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
            renderTree(currentChapter);
        }

        function switchChapter(chapterId) {
            currentChapter = chapterId;
            document.querySelectorAll('.chapter-tab').forEach(tab => {
                const tabChapter = parseInt(tab.getAttribute('onclick').match(/\d+/)[0]);
                if (tabChapter === chapterId) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            renderTree(chapterId);
        }

        function renderTree(chapterId) {
            const chapterData = KNOWLEDGE_TREE[chapterId - 1];
            if (!chapterData) return;

            setTimeout(() => {
                const chartDom = document.getElementById('knowledgeTree');
                if (!chartDom) return;

                const myChart = echarts.init(chartDom);

                const treeData = {
                    name: chapterData.name,
                    id: chapterData.id,
                    children: chapterData.children.map(node => {
                        const level = getMasteryLevel(node.id);
                        return {
                            name: node.name,
                            id: node.id,
                            value: level,
                            description: node.description,
                            itemStyle: { color: getNodeColor(level) }
                        };
                    })
                };

                const option = {
                    tooltip: {
                        formatter: function(params) {
                            if (params.name) {
                                const node = chapterData.children.find(c => c.name === params.name);
                                if (node) {
                                    const level = getMasteryLevel(node.id);
                                    return `
                                        <div style="font-weight: 600; margin-bottom: 4px;">${params.name}</div>
                                        <div>掌握度：<span style="color: ${getNodeColor(level)};">${level}%</span></div>
                                        <div style="font-size: 12px; color: #666; margin-top: 4px;">${node.description || ''}</div>
                                    `;
                                }
                            }
                            return params.name;
                        }
                    },
                    series: [{
                        type: 'tree',
                        data: [treeData],
                        top: '5%',
                        left: '7%',
                        bottom: '2%',
                        right: '20%',
                        symbolSize: 10,
                        label: {
                            position: 'left',
                            verticalAlign: 'middle',

        function fallbackGrade(code, knowledgePoint = '') {
            const result = {
                total_score: 0,
                dimensions: {
                    syntax: { score: 0, max: 30, issues: [] },
                    logic: { score: 0, max: 30, issues: [] },
                    standard: { score: 0, max: 20, issues: [] },
                    knowledge: { score: 0, max: 20, issues: [] }
                },
                suggestions: [],
                code: code,
                feedback: '',
                timestamp: new Date().toLocaleString()
            };
            
            const lowerCode = code.toLowerCase();
            const lines = code.split('\n').filter(l => l.trim().length > 0);
            
            const syntaxChecks = [
                { pattern: /class\s+\w+/, name: '类定义', score: 5 },
                { pattern: /\w+\s*\([^)]*\)\s*{/, name: '函数定义', score: 5 },
                { pattern: /[{}]/, name: '代码块括号', score: 5 },
                { pattern: /;/, name: '语句结束符', score: 5 },
                { pattern: /if\s*\(|else/, name: '条件语句', score: 5 },
                { pattern: /for\s*\(|while\s*\(/, name: '循环语句', score: 5 }
            ];
            
            syntaxChecks.forEach(check => {
                if (check.pattern.test(code)) {
                    result.dimensions.syntax.score += check.score;
                } else {
                    result.dimensions.syntax.issues.push(`缺少${check.name}`);
                }
            });
            
            const openBraces = (code.match(/{/g) || []).length;
            const closeBraces = (code.match(/}/g) || []).length;
            if (openBraces !== closeBraces) {
                result.dimensions.syntax.score -= 5;
                result.dimensions.syntax.issues.push(`括号不匹配 (${openBraces}个{，${closeBraces}个})`);
            }
            
            if (code.includes('    ') || code.includes('\t')) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('缩进不规范');
            }
            
            if (lines.length >= 5) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('代码行数过少');
            }
            
            if (/[a-z][a-zA-Z0-9]*/.test(code)) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('命名不规范');
            }
            
            if (code.includes('//') || code.includes('/*') || code.includes('#')) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('缺少注释');
            }
            
            if (lowerCode.includes('class')) {
                result.dimensions.logic.score += 5;
                if (lowerCode.includes('constructor')) {
                    result.dimensions.logic.score += 5;
                }
                if (lowerCode.includes('this')) {
                    result.dimensions.logic.score += 5;
                }
            }
            
            if (lowerCode.includes('if') || lowerCode.includes('else')) {
                result.dimensions.logic.score += 5;
            }
            if (lowerCode.includes('for') || lowerCode.includes('while')) {
                result.dimensions.logic.score += 5;
            }
            if (lowerCode.includes('return')) {
                result.dimensions.logic.score += 5;
            }
            
            result.dimensions.syntax.score = Math.min(result.dimensions.syntax.score, 30);
            result.dimensions.logic.score = Math.min(result.dimensions.logic.score, 30);
            result.dimensions.standard.score = Math.min(result.dimensions.standard.score, 20);
            result.dimensions.knowledge.score = Math.min(result.dimensions.knowledge.score, 20);
            
            result.total_score = result.dimensions.syntax.score + 
                               result.dimensions.logic.score + 
                               result.dimensions.standard.score + 
                               result.dimensions.knowledge.score;
            
            if (result.dimensions.syntax.issues.length > 0) {
                result.suggestions.push(...result.dimensions.syntax.issues.map(i => `🔧 语法问题：${i}`));
            }
            if (result.dimensions.standard.issues.length > 0) {
                result.suggestions.push(...result.dimensions.standard.issues.map(i => `📝 规范问题：${i}`));
            }
            if (result.dimensions.logic.issues.length > 0) {
                result.suggestions.push(...result.dimensions.logic.issues.map(i => `💡 逻辑问题：${i}`));
            }
            if (result.dimensions.knowledge.issues.length > 0) {
                result.suggestions.push(...result.dimensions.knowledge.issues.map(i => `🎯 知识点：${i}`));
            }
            
            if (result.total_score >= 90) {
                result.feedback = '🌟 非常优秀！代码质量很高。';
            } else if (result.total_score >= 80) {
                result.feedback = '✨ 良好！代码基本正确。';
            } else if (result.total_score >= 70) {
                result.feedback = '📚 尚可，有改进空间。';
            } else if (result.total_score >= 60) {
                result.feedback = '🔨 及格，建议根据建议完善。';
            } else {
                result.feedback = '💪 需要加强，多练习。';
            }
            
            return result;
        }

        function displayAIGradeResult(result) {
            const d = result.dimensions;
            
            let html = `
                <div class="ai-score">${result.total_score} 分</div>
                <div style="text-align: center; margin-bottom: 20px; color: #64748b;">
                    <i class="fas fa-calendar"></i> ${result.timestamp}
                </div>
            `;
            
            if (result.code) {
                html += `
                    <div class="code-block">
                        <pre>${result.code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                    </div>
                `;
            }
            
            html += '<h4 style="margin: 20px 0 15px;">📊 维度得分</h4>';
            
            const dimensions = [
                { name: '语法正确性', score: d.syntax.score, max: 30, issues: d.syntax.issues },
                { name: '逻辑完整性', score: d.logic.score, max: 30, issues: d.logic.issues },
                { name: '代码规范', score: d.standard.score, max: 20, issues: d.standard.issues },
                { name: '知识点运用', score: d.knowledge.score, max: 20, issues: d.knowledge.issues }
            ];

            dimensions.forEach(dim => {
                const percentage = (dim.score / dim.max) * 100;
                html += `
                    <div class="dimension-item">
                        <div class="dimension-header">
                            <span class="dimension-name">${dim.name}</span>
                            <span class="dimension-score">${dim.score}/${dim.max}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                        ${dim.issues.length > 0 ? 
                            `<ul class="issue-list">${dim.issues.map(i => `<li>${i}</li>`).join('')}</ul>` : 
                            '<p style="color: #10b981; font-size: 13px; margin-top: 5px;">✓ 良好</p>'}
                    </div>
                `;
            });
            
            if (result.suggestions && result.suggestions.length > 0) {
                html += `
                    <h4 style="margin: 20px 0 15px;">💡 改进建议</h4>
                    ${result.suggestions.map(s => `<div class="suggestion-item">${s}</div>`).join('')}
                `;
            }
            
            html += `
                <div class="feedback-box">
                    <p><strong>📝 评语：</strong> ${result.feedback}</p>
                </div>
            `;
            
            document.getElementById('aiResultContent').innerHTML = html;
        }

        // ==================== 我的作业（支持多班级，基于实际作业总分） ====================
function loadHomework() {
    // 设置当前菜单项为激活状态
    setActiveMenuItem(event.target);
    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-pen-to-square"></i> 我的作业';

    const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    const latestStudent = studentList.find(s => s.id === currentStudent.id || s.studentId === currentStudent.id);
    if (latestStudent) {
        currentStudent.classIds = latestStudent.classIds || [];
        currentStudent.classId = latestStudent.classId;
        // 更新 localStorage 中的 currentStudent
        localStorage.setItem('currentStudent', JSON.stringify(currentStudent));
    }
    
    // 获取学生加入的所有班级ID
    const classIds = currentStudent.classIds || [];
    
    // 如果没有加入任何班级，显示提示
    if (classIds.length === 0) {
        document.getElementById('content').innerHTML = `
            <div class="card" style="text-align: center; padding: 60px;">
                <i class="fas fa-users-slash" style="font-size: 60px; color: #94a3b8; margin-bottom: 20px;"></i>
                <div style="color: #64748b; font-size: 16px;">您还没有加入任何班级</div>
                <div style="color: #94a3b8; font-size: 13px; margin-top: 8px;">请先加入班级，才能查看作业</div>
                <button class="btn btn-primary" onclick="loadMyClass()" style="margin-top: 20px; border-radius: 30px;">
                    <i class="fas fa-user-plus"></i> 去加入班级
                </button>
            </div>
        `;
        return;
    }

    // 加载数据
    homeworkList = JSON.parse(localStorage.getItem("homeworkList") || "[]");
    const classList = JSON.parse(localStorage.getItem('classList') || '[]');
    const checkedHomework = JSON.parse(localStorage.getItem("checkedHomework") || "[]");
    
    // 辅助函数：获取作业总分
    function getHomeworkTotalScore(hw) {
        if (!hw) return 100;
        if (hw.totalScore && hw.totalScore > 0) return hw.totalScore;
        if (hw.questions && hw.questions.length > 0) {
            return hw.questions.reduce((sum, q) => sum + (q.score || 0), 0);
        }
        return 100;
    }
    
    // 辅助函数：获取得分率
    function getScoreRate(score, totalScore) {
        if (totalScore === 0) return 0;
        return (score / totalScore) * 100;
    }
    
    // 辅助函数：获取分数颜色
    function getScoreColor(rate) {
        if (rate >= 90) return '#10b981';
        if (rate >= 75) return '#3b82f6';
        if (rate >= 60) return '#f59e0b';
        return '#ef4444';
    }
    
    // 获取该学生所有已批改的作业记录
    const myChecked = checkedHomework.filter(h => h.studentId === currentStudent.id);

    const myHomework = homeworkList.filter(hw => classIds.includes(hw.class_id));
    
    // 按班级分组
    const groupedByClass = {};
    myHomework.forEach(hw => {
        const classInfo = classList.find(c => c.id === hw.class_id);
        const className = classInfo ? classInfo.name : '未知班级';

async function submitMultiQuestionHomework() {
    if (!currentHomework) {
        alert('作业信息不存在，请重新打开');
        return;
    }
    
    const questions = currentHomework.questions || [];
    let answers = {};
    let allAnswered = true;
    
    // 收集所有题目的答案
    if (questions.length > 0) {
        for (const q of questions) {
            let answer = '';
            if (q.type === 'choice') {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                answer = selected ? selected.value : '';
            } else if (q.type === 'fill') {
                const input = document.getElementById(`fill_${q.id}`);
                answer = input ? input.value.trim() : '';
            } else if (q.type === 'judge') {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                answer = selected ? selected.value : '';
            } else if (q.type === 'programming') {
                const textarea = document.getElementById(`code_${q.id}`);
                answer = textarea ? textarea.value : '';
            }
            
            if (!answer && q.type !== 'programming') {
                allAnswered = false;
                alert(`请回答第 ${questions.indexOf(q) + 1} 题`);
                return;
            }
            answers[q.id] = answer;
        }
    } else {
        // 兼容旧版作业（单题）
        let answer = '';
        if (currentHomework.questionType === 'choice' || currentHomework.questionType === 'judge') {
            const selected = document.querySelector('input[name="singleAnswer"]:checked');
            answer = selected ? selected.value : '';
        } else {
            answer = document.getElementById('answerContent')?.value.trim() || '';
        }
        if (!answer) {
            alert('请填写答案');
            return;
        }
        answers['single'] = answer;
    }
    
    if (!allAnswered) return;
    
    const classList = JSON.parse(localStorage.getItem('classList') || '[]');
    const targetClass = classList.find(c => c.id === currentHomework.class_id);
    const className = targetClass ? targetClass.name : '未知班级';
    
    const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    const student = studentList.find(s => s.id === currentStudent.id || s.studentId === currentStudent.id);
    
    let history = JSON.parse(localStorage.getItem("checkedHomework") || "[]");
    const existingIndex = history.findIndex(h => h.studentId === currentStudent.id && h.homeworkTitle === currentHomework.title);
    
    const record = {
        homeworkTitle: currentHomework.title,
        homeworkId: currentHomework.id,
        homeworkClassId: currentHomework.class_id,
        homeworkClassName: className,
        studentId: currentStudent.id,
        studentName: currentStudent.name,
        studentClassIds: student?.classIds || currentStudent.classIds || [],
        answers: answers,
        timestamp: new Date().toISOString(),
        time: new Date().toLocaleString(),
        totalScore: 0  // 初始化为0，后面累加
    };
    
    // ========== 计算总分 ==========
    let totalStudentScore = 0;
    const questionScores = [];
    
    // 遍历所有题目，逐题评分
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const userAnswer = answers[q.id];
        const maxScore = q.score || 10;  // 每道题的分值
        let score = 0;
        let isCorrect = false;
        
        if (q.type === 'choice' || q.type === 'judge') {
            // 客观题：直接比对答案
            if (q.type === 'choice') {
                isCorrect = userAnswer === q.answer;
                score = isCorrect ? maxScore : 0;
            } else if (q.type === 'judge') {
                isCorrect = userAnswer === q.answer;
                score = isCorrect ? maxScore : 0;
            }
            
            questionScores.push({
                questionId: q.id,
                questionContent: q.content.substring(0, 50),
                userAnswer: userAnswer,
                correctAnswer: q.answer,
                score: score,
                isCorrect: isCorrect,
                maxScore: maxScore,
                type: q.type
            });
            totalStudentScore += score;
            
        } else if (q.type === 'fill') {
            // 填空题：部分匹配给分
            const correctAnswers = (q.answer || '').split('|').map(a => a.trim().toLowerCase());
            const userAnswers = userAnswer.split('|').map(a => a.trim().toLowerCase());
            const matchCount = userAnswers.filter(a => correctAnswers.includes(a)).length;
            score = Math.round((matchCount / correctAnswers.length) * maxScore);
            isCorrect = matchCount === correctAnswers.length;
            
            questionScores.push({
                questionId: q.id,
                questionContent: q.content.substring(0, 50),
                userAnswer: userAnswer,
                correctAnswer: q.answer,
                score: score,
                isCorrect: isCorrect,
                maxScore: maxScore,
                type: q.type
            });
            totalStudentScore += score;
            
        } else if (q.type === 'programming') {
            // 编程题：调用AI批改
            const codeAnswer = userAnswer;
            const questionContent = q.content;
            const knowledgeTags = q.knowledge_tags ? q.knowledge_tags.join(',') : currentHomework.knowledge_tag || '';
            
            // 构建AI批改提示
            const aiResult = await aiGradeHomework(codeAnswer, questionContent, knowledgeTags);
            
            // 编程题得分按比例计算（AI返回总分0-100，按比例换算成题目分值）
            const aiPercentage = aiResult.total_score / 100;
            score = Math.round(aiPercentage * maxScore);
            
            questionScores.push({
                questionId: q.id,
                questionContent: q.content.substring(0, 50),
                userAnswer: codeAnswer,
                score: score,
                maxScore: maxScore,
                type: q.type,
                aiAnalysis: aiResult,
                dimensions: aiResult.dimensions,
                suggestions: aiResult.suggestions,
                feedback: aiResult.feedback
            });
            totalStudentScore += score;
            
            // 记录薄弱知识点
            if (aiResult.total_score < 60 && knowledgeTags) {
                const tags = knowledgeTags.split(',').map(t => t.trim());
                record.weakPoints = [...(record.weakPoints || []), ...tags];
            }
        }
    }
    
    // 保存得分
    record.totalScore = totalStudentScore;
    record.total_score = totalStudentScore;
    record.score = totalStudentScore;
    record.questionScores = questionScores;
    
    // 生成总体评语
    const totalMaxScore = currentHomework.totalScore || questions.reduce((sum, q) => sum + (q.score || 0), 0);
    const percentage = (totalStudentScore / totalMaxScore) * 100;
    
    if (percentage >= 90) {
        record.feedback = `🎉 优秀！得分 ${totalStudentScore}/${totalMaxScore} 分，代码质量很高，知识点掌握扎实。`;
    } else if (percentage >= 75) {
        record.feedback = `✨ 良好！得分 ${totalStudentScore}/${totalMaxScore} 分，代码基本正确，有少量改进空间。`;
    } else if (percentage >= 60) {
        record.feedback = `📚 及格！得分 ${totalStudentScore}/${totalMaxScore} 分，需要加强基础知识的练习。`;
    } else {
        record.feedback = `💪 需要加强！得分 ${totalStudentScore}/${totalMaxScore} 分，建议重新学习相关知识点后重做。`;
    }
    
    // 保存批改记录
    if (existingIndex >= 0) {
        history[existingIndex] = { ...history[existingIndex], ...record };
    } else {
        history.push(record);
    }
    localStorage.setItem("checkedHomework", JSON.stringify(history));
    
    // 更新学生的薄弱知识点缓存
    if (record.weakPoints && record.weakPoints.length > 0) {
        updateStudentWeakPoints(currentStudent.id, currentHomework.title, record.weakPoints);
    }
    
    // 触发教师端数据更新
    localStorage.setItem('homework_last_update', Date.now().toString());
    const cacheKey = `class_homework_stats_${currentHomework.class_id}`;
    localStorage.setItem(cacheKey, JSON.stringify({
        lastUpdate: Date.now(),
        homeworkTitle: currentHomework.title
    }));
    
    // 发送通知给教师
    let teacherNotifications = JSON.parse(localStorage.getItem(`notifications_teacher`) || '[]');
    teacherNotifications.unshift({
        id: Date.now() + Math.random(),
        type: 'homework_submit',
        title: '📝 学生提交作业',
        content: `${currentStudent.name} 提交了作业《${currentHomework.title}》，得分：${totalStudentScore}/${totalMaxScore}分，薄弱知识点：${(record.weakPoints || []).join('、') || '无'}`,
        time: new Date().toLocaleString(),
        isRead: false,
        studentId: currentStudent.id,
        homeworkTitle: currentHomework.title,
        weakPoints: record.weakPoints
    });
    localStorage.setItem(`notifications_teacher`, JSON.stringify(teacherNotifications));
    
    closeModal('submitHomeworkModal');
    loadHomework();
    
    // 显示提交成功提示
    const weakMsg = record.weakPoints && record.weakPoints.length > 0 ? `\n📌 薄弱知识点：${record.weakPoints.slice(0, 3).join('、')}` : '';
    
    if (percentage >= 90) {
        alert(`🎉 作业提交成功！得分：${totalStudentScore}/${totalMaxScore} 分，非常优秀！${weakMsg}`);
    } else if (percentage >= 60) {
        alert(`✅ 作业提交成功！得分：${totalStudentScore}/${totalMaxScore} 分，继续加油！${weakMsg}`);
    } else {
        alert(`📚 作业已提交！得分：${totalStudentScore}/${totalMaxScore} 分，建议查看反馈，针对薄弱知识点加强学习。${weakMsg}`);
    }
}

function viewHomeworkDetail(homeworkId) {
    const homework = homeworkList.find(h => h.id === homeworkId);
    if (!homework) return;
    
    const checkedHomework = JSON.parse(localStorage.getItem("checkedHomework") || "[]");
    const record = checkedHomework.find(c => c.studentId === currentStudent.id && c.homeworkTitle === homework.title);
    
    if (!record) {
        alert('未找到作业记录');
        return;
    }
    
    const questions = homework.questions || [];
    const totalScore = homework.totalScore || 100;
    const studentTotalScore = record.total_score || record.totalScore || record.score || 0;
    
    let questionsHtml = '';
    
    if (questions.length > 0 && record.questionScores) {
        questions.forEach((q, idx) => {
            const qScore = record.questionScores.find(qs => qs.questionId === q.id) || { score: 0, userAnswer: '', isCorrect: false };
            const isCorrect = qScore.isCorrect;
            const userAnswer = record.answers ? record.answers[q.id] : '';
            
            let statusIcon = isCorrect ? '✅' : '❌';
            let statusColor = isCorrect ? '#10b981' : '#ef4444';
            let correctDisplay = '';

    });
    localStorage.setItem("checkedHomework", JSON.stringify(history));

    closeModal('homeworkModal');
    loadHomework();
}
 

// 从AI批改结果中提取薄弱知识点
function extractWeakPointsFromAIGrade(aiResult) {
    const weakPoints = [];
    
    // 检查各维度得分，低于60%的维度对应的知识点算薄弱
    if (aiResult.dimensions) {
        const dim = aiResult.dimensions;
        
        // 语法得分低 -> 语法知识点薄弱
        if (dim.syntax && dim.syntax.score < 18) {
            weakPoints.push('语法规范');
        }
        
        // 逻辑得分低 -> 逻辑思维薄弱
        if (dim.logic && dim.logic.score < 18) {
            weakPoints.push('逻辑思维');
        }
        
        // 规范得分低 -> 代码规范薄弱
        if (dim.standard && dim.standard.score < 12) {
            weakPoints.push('代码规范');
        }
        
        // 知识点运用得分低 -> 具体知识点薄弱
        if (dim.knowledge && dim.knowledge.score < 12) {
            // 从AI的issues中提取具体知识点
            if (dim.knowledge.issues && dim.knowledge.issues.length > 0) {
                dim.knowledge.issues.forEach(issue => {
                    // 提取知识点名称
                    const matchedPoint = extractKnowledgePointFromIssue(issue);
                    if (matchedPoint && !weakPoints.includes(matchedPoint)) {
                        weakPoints.push(matchedPoint);
                    }
                });
            }
        }
    }
    
    // 如果总分低于60，整体薄弱
    if (aiResult.total_score < 60) {
        weakPoints.push('整体理解');
    }
    
    return weakPoints;
}

// 从问题描述中提取知识点
function extractKnowledgePointFromIssue(issue) {
    const keywords = {
        '类': '类与对象',
        '对象': '类与对象',
        '继承': '继承',
        '多态': '多态',
        '虚函数': '虚函数',
        '指针': '指针',
        '引用': '引用',
        '构造函数': '构造函数',
        '析构函数': '析构函数',
        '重载': '运算符重载',
        '封装': '封装',
        '数组': '数组',
        '循环': '循环结构',
        '条件': '条件语句',
        '函数': '函数',
        '语法': '语法规范'
    };
    
    for (let [key, value] of Object.entries(keywords)) {
        if (issue.includes(key)) {
            return value;
        }
    }
    return null;
}

        function startQuiz(quizId) {
            const quiz = quizList.find(q => q.id === quizId);
            if (!quiz) return;

            currentQuiz = { ...quiz, selectedOption: null, submitted: false };
            renderQuiz();
        }

        function renderQuiz() {
            if (!currentQuiz) return;

            const difficultyClass = currentQuiz.difficulty === 'easy' ? 'difficulty-easy' : 
                                   currentQuiz.difficulty === 'medium' ? 'difficulty-medium' : 'difficulty-hard';
            const difficultyText = currentQuiz.difficulty === 'easy' ? '简单' : 
                                   currentQuiz.difficulty === 'medium' ? '中等' : '困难';

            let optionsHtml = '';
            currentQuiz.options.forEach((option, index) => {
                const optionLetter = String.fromCharCode(65 + index);
                optionsHtml += `
                    <label class="quiz-option ${currentQuiz.selectedOption === optionLetter ? 'selected' : ''}">
                        <input type="radio" name="quizOption" value="${optionLetter}" 
                               ${currentQuiz.selectedOption === optionLetter ? 'checked' : ''}
                               onchange="selectQuizOption('${optionLetter}')">
                        <span class="quiz-option-label">${option}</span>
                    </label>
                `;
            });

            let resultHtml = '';
            if (currentQuiz.submitted) {
                const isCorrect = currentQuiz.selectedOption === currentQuiz.answer;
                resultHtml = `
                    <div class="quiz-result ${isCorrect ? 'correct' : 'incorrect'}">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'}" style="font-size: 24px;"></i>
                            <div>
                                <div style="font-weight: 600; margin-bottom: 4px;">
                                    ${isCorrect ? '✓ 回答正确！' : '✗ 回答错误'}
                                </div>
                                <div>正确答案：${currentQuiz.answer} - ${currentQuiz.options[currentQuiz.answer.charCodeAt(0) - 65]}</div>
                                <div style="margin-top: 8px; color: #64748b;">解析：${currentQuiz.explanation}</div>
                            </div>
                        </div>
                    </div>
                `;

            document.getElementById('quizModalTitle').innerHTML = `${currentQuiz.topic} - 答题`;
            document.getElementById('quizContent').innerHTML = `

                    <div class="quiz-question">

                                <button class="btn btn-primary" onclick="submitQuiz()" ${!currentQuiz.selectedOption ? 'disabled' : ''}>
                                    <i class="fas fa-check"></i> 提交答案
                                </button>
                            ` : ''}

                    </div>

        }

// 学生端 - submitQuiz 
async function submitQuiz() {
    if (!currentQuiz || !currentQuiz.selectedOption || currentQuiz.submitted) return;

    const isCorrect = currentQuiz.selectedOption === currentQuiz.answer;

    // ========== 1. 保存到学生个人历史 ==========
    const studentRecord = {
        quizId: currentQuiz.id,
        quizTitle: currentQuiz.question.substring(0, 50),
        topic: currentQuiz.topic,
        selectedOption: currentQuiz.selectedOption,
        correctOption: currentQuiz.answer,
        isCorrect: isCorrect,
        timestamp: new Date().toLocaleString(),
        studentId: currentStudent.id,
        studentName: currentStudent.name
    };
    
    let studentHistory = JSON.parse(localStorage.getItem(`quizHistory_${currentStudent.id}`) || '[]');
    const existingIndex = studentHistory.findIndex(h => h.quizId === currentQuiz.id);
    if (existingIndex >= 0) {
        studentHistory[existingIndex] = studentRecord;
    } else {
        studentHistory.push(studentRecord);
    }
    localStorage.setItem(`quizHistory_${currentStudent.id}`, JSON.stringify(studentHistory));
    quizHistory = studentHistory;
    
    // ========== 2. 保存到全局历史（教师端统计用）==========
    let globalHistory = JSON.parse(localStorage.getItem('quizHistory') || '[]');
    const existingGlobalIndex = globalHistory.findIndex(h => 
        h.quizId === currentQuiz.id && h.studentId === currentStudent.id
    );
    if (existingGlobalIndex >= 0) {
        globalHistory[existingGlobalIndex] = {
            quizId: currentQuiz.id,
            isCorrect: isCorrect,
            studentId: currentStudent.id,
            timestamp: new Date().toISOString()
        };
    } else {
        globalHistory.push({
            quizId: currentQuiz.id,
            isCorrect: isCorrect,
            studentId: currentStudent.id,
            timestamp: new Date().toISOString()
        });
    }
    localStorage.setItem('quizHistory', JSON.stringify(globalHistory));
    
    // ========== 3. 更新题库统计 ==========
    let quizList = JSON.parse(localStorage.getItem('quizList') || '[]');
    const updatedHistory = JSON.parse(localStorage.getItem('quizHistory') || '[]');
    quizList.forEach(quiz => {
        const records = updatedHistory.filter(h => h.quizId === quiz.id);
        quiz.attemptCount = records.length;
        quiz.correctRate = records.length > 0 ? 
            Math.round((records.filter(h => h.isCorrect).length / records.length) * 100) : 0;
    });
    localStorage.setItem('quizList', JSON.stringify(quizList));
    // ========== 记录结束 ==========

    if (!isCorrect) {
        for (const chapter of KNOWLEDGE_TREE) {
            const node = chapter.children.find(c => c.name === currentQuiz.topic);
            if (node) {
                updateMastery(node.id);
                break;
            }
        }
    }

    currentQuiz.submitted = true;
    renderQuiz();
    
    // 显示结果提示
    alert(isCorrect ? '🎉 回答正确！' : `❌ 回答错误！正确答案是 ${currentQuiz.answer}\n\n${currentQuiz.explanation}`);
}
function updateGlobalQuizStats() {

        quiz.attemptCount = attemptCount;
        quiz.correctRate = attemptCount > 0 ? Math.round((correctCount / attemptCount) * 100) : 0;
    });
    
    localStorage.setItem('quizList', JSON.stringify(quizList));
}

function joinClass() {
    const code = document.getElementById('classCode').value.trim();
    if (!code) {
        document.getElementById('joinResult').innerHTML = '<span class="join-error">❌ 请输入邀请码</span>';
        return;
    }
    
    let classList = JSON.parse(localStorage.getItem('classList') || '[]');
    let studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
    
    const targetClass = classList.find(c => c.inviteCode === code);

    if (!targetClass) {
        document.getElementById('joinResult').innerHTML = '<span class="join-error">❌ 邀请码无效</span>';
        return;
    }

    // 获取当前学生的班级列表
    let currentClassIds = currentStudent.classIds || [];
    
    // 检查是否已加入该班级
    if (currentClassIds.includes(targetClass.id)) {
        document.getElementById('joinResult').innerHTML = `<span class="join-error">❌ 您已加入班级「${targetClass.name}」</span>`;
        return;
    }

    // 更新学生的班级列表
    currentClassIds.push(targetClass.id);
    currentStudent.classIds = currentClassIds;
    
    // 更新 studentList（同时兼容旧字段 classId）
    let updatedStudentList = studentList.map(s => 
        (s.id === currentStudent.id || s.studentId === currentStudent.id) 
            ? { ...s, classIds: currentClassIds, classId: targetClass.id }  
            : s
    );
    localStorage.setItem('studentList', JSON.stringify(updatedStudentList));
    
    // ========== 关键修复：更新班级人数 ==========
    let updatedClassList = classList.map(c => {
        if (c.id === targetClass.id) {
            // 统计该班级的实际学生数（同时检查 classId 和 classIds）
            const studentCount = updatedStudentList.filter(s => 
                s.classId === c.id || (s.classIds && s.classIds.includes(c.id))
            ).length;
            return { ...c, studentCount: studentCount };
        }
        return c;
    });
    localStorage.setItem('classList', JSON.stringify(updatedClassList));

    // 更新 currentUser 中的班级信息
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (currentUser && currentUser.username === currentStudent.id) {
        currentUser.classIds = currentClassIds;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    // 更新 localStorage 中的 currentStudent
    localStorage.setItem('currentStudent', JSON.stringify(currentStudent));

    document.getElementById('joinResult').innerHTML = `<span class="join-success">✅ 成功加入班级：${targetClass.name}</span>`;
    document.getElementById('classCode').value = '';
    
    // 刷新班级页面显示
    setTimeout(() => {
        loadMyClass();
        // 同时刷新作业页面，让新班级的作业显示出来
        const currentPageTitle = document.getElementById('pageTitle').innerHTML;
        if (currentPageTitle.includes('我的作业')) {
            loadHomework();
        }
    }, 500);
}

    const currentClassIds = currentStudent.classIds || [];

    let updatedStudentList = studentList.map(s =>

            ? { ...s, classIds: updatedClassIds } 
            : s
    );
