<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOP智慧教学平台 · 登录</title>
    <!-- 字体与图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Microsoft YaHei", sans-serif;
            background: #0b1120;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 动态粒子背景 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1320px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-glass {
            width: 100%;
            max-width: 1100px;
            min-height: 600px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            display: flex;
            overflow: hidden;
        }

        /* 左侧品牌区 */
        .brand-panel {
            flex: 1.1;
            padding: 60px 50px;
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.1));
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.2), transparent 60%);
            pointer-events: none;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.4);
        }

        .brand-icon i {
            font-size: 36px;
            color: white;
        }

        .brand-title {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
            color: white;
            margin-bottom: 16px;
        }

        .brand-title span {
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 48px;
            max-width: 320px;
            line-height: 1.6;
        }

        .knowledge-stats {
            display: flex;
            gap: 28px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        /* 右侧登录区 */
        .login-panel {
            flex: 0.9;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 32px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
        }

        .login-header p a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .login-header p a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .role-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .role-tab {
            flex: 1;
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: 500;
            font-size: 15px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .role-tab i {
            font-size: 16px;
        }

        .role-tab.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 8px 20px -6px #3b82f6;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 18px;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            height: 56px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 0 20px 0 52px;
            font-size: 15px;
            color: white;
            transition: all 0.2s;
            font-family: "Inter", sans-serif;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-wrapper input::placeholder {
            color: #334155;
            font-weight: 400;
        }

        .input-wrapper.focused i {
            color: #3b82f6;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
            border-radius: 4px;
            cursor: pointer;
        }

        .remember-me span {
            color: #94a3b8;
            font-size: 14px;
        }

        .forgot-link {
            color: #3b82f6;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px -8px #3b82f6;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px #3b82f6;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
            color: #475569;
            font-size: 13px;
        }

        .login-footer a {
            color: #64748b;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: #94a3b8;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-container {
            width: 100%;
            max-width: 460px;
            background: #1e293b;
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .modal-header h3 {
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        .close-modal {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-body .input-group {
            margin-bottom: 20px;
        }

        .code-group {
            display: flex;
            gap: 12px;
        }

        .code-group .input-wrapper {
            flex: 1;
        }

        .send-code-btn {
            width: 120px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-code-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: white;
        }

        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-btn {
            width: 100%;
            height: 54px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .login-glass {
                flex-direction: column;
                max-width: 500px;
            }
            .brand-panel {
                padding: 40px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .brand-title {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 40px 25px;
            }
            .role-tabs {
                flex-direction: column;
                border-radius: 30px;
            }
        }
    </style>
    <!-- 粒子库 (轻量) -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <div class="login-wrapper">
        <div class="login-glass">
            <!-- 左侧品牌区 -->
            <div class="brand-panel">
                <div class="brand-icon">
                    <i class="fas fa-code"></i>
                </div>
                <div class="brand-title">
                    面向对象<br><span>智慧教学平台</span>
                </div>
                <div class="brand-sub">
                    基于七章PPT知识图谱的OOP学习系统 · 让编程学习更智能
                </div>
                <div class="knowledge-stats">
                    <div class="stat-item">
                        <span class="stat-value">7</span>
                        <span class="stat-label">教学章节</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">60+</span>
                        <span class="stat-label">知识点</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">AI</span>
                        <span class="stat-label">智能批改</span>
                    </div>
                </div>
            </div>

            <!-- 右侧登录区 -->
            <div class="login-panel">
                <div class="login-header">
                    <h2>登录账号</h2>
                    <p>新用户？ <a href="#" id="openRegisterLink">立即注册</a></p>
                </div>

                <!-- 角色切换标签 -->
                <div class="role-tabs">
                    <div class="role-tab active" data-role="student" id="tabStudent">
                        <i class="fas fa-graduation-cap"></i>
                        <span>学生</span>
                    </div>
                    <div class="role-tab" data-role="teacher" id="tabTeacher">
                        <i class="fas fa-chalkboard-user"></i>
                        <span>教师</span>
                    </div>
                </div>

                <!-- 登录表单 -->
                <div class="input-group">
                    <label>学号 / 工号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="请输入账号" value="2024215612" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" value="123456">
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>记住密码</span>
                    </label>
                    <a href="#" class="forgot-link" id="openForgotModal">忘记密码？</a>
                </div>

                <button class="login-btn" id="loginBtn">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    登录
                </button>

                <div class="login-footer">
                    <a href="#">帮助</a> · 
                    <a href="#">隐私政策</a> · 
                    <a href="#">© 2025 OOP Lab</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 忘记密码模态框 -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3>找回密码</h3>
                <button class="close-modal" id="closeForgotModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>账号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="forgotUsername" placeholder="请输入学号/工号">
                    </div>
                </div>
                <div class="input-group">
                    <label>身份</label>
                    <div class="input-wrapper">
                        <i class="fas fa-tag"></i>
                        <input type="text" id="forgotRole" placeholder="student 或 teacher" value="student">
                    </div>
                </div>
                <div class="code-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="forgotCode" placeholder="验证码">
                    </div>
                    <button class="send-code-btn" id="sendCodeBtn">获取验证码</button>
                </div>
                <div class="input-group">
                    <label>新密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="至少6位">
                    </div>
                </div>
                <div class="input-group">
                    <label>确认新密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmNewPassword" placeholder="再次输入">
                    </div>
                </div>
                <button class="modal-btn" id="resetPwdBtn">重置密码</button>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3>注册新账号</h3>
                <button class="close-modal" id="closeRegisterModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>学号/工号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="regUsername" placeholder="例如 2024215612">
                    </div>
                </div>
                <div class="input-group">
                    <label>姓名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-signature"></i>
                        <input type="text" id="regName" placeholder="真实姓名">
                    </div>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="至少6位">
                    </div>
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regConfirmPwd" placeholder="再次输入">
                    </div>
                </div>
                <div class="role-tabs" style="margin: 20px 0 10px;">
                    <div class="role-tab active" data-role="student" id="regTabStudent">
                        <i class="fas fa-graduation-cap"></i> 学生
                    </div>
                    <div class="role-tab" data-role="teacher" id="regTabTeacher">
                        <i class="fas fa-chalkboard-user"></i> 教师
                    </div>
                </div>
                <button class="modal-btn" id="registerSubmitBtn">立即注册</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 粒子背景初始化 ====================
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#3b82f6' },
                shape: { type: 'circle' },
                opacity: {
                    value: 0.3,
                    random: true,
                    anim: { enable: true, speed: 1, opacity_min: 0.1 }
                },
                size: {
                    value: 3,
                    random: true,
                    anim: { enable: true, speed: 2, size_min: 0.3 }
                },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#3b82f6',
                    opacity: 0.15,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1.5,
                    direction: 'none',
                    random: true,
                    straight: false,
                    out_mode: 'out',
                    bounce: false
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: { enable: true, mode: 'grab' },
                    onclick: { enable: true, mode: 'push' },
                    resize: true
                },
                modes: {
                    grab: { distance: 200, line_linked: { opacity: 0.4 } },
                    push: { particles_nb: 3 }
                }
            },
            retina_detect: true
        });

        // ==================== 全局配置 ====================
        axios.defaults.baseURL = 'http://127.0.0.1:5000';
        axios.defaults.headers.post['Content-Type'] = 'application/json';
        axios.defaults.withCredentials = true;

        // 本地存储键
        const STORAGE_KEYS = {
            USERS: 'edu_users',
            CURRENT_USER: 'currentUser',
            LOGIN_INFO: 'edu_login_info',
            STUDENT_LIST: 'studentList',
            TEACHER_LIST: 'teacherList'
        };

        // ==================== 初始化默认用户 ====================
        (function initUsers() {
            let users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (users.length === 0) {
                users = [
                    { username: '2024215612', password: '123456', role: 'student', name: '张三' },
                    { username: '2024215613', password: '123456', role: 'student', name: '李四' },
                    { username: 'T2024001', password: '123456', role: 'teacher', name: '张老师' }
                ];
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
                
                // 初始化学生列表
                const studentList = users.filter(u => u.role === 'student').map(u => ({
                    id: u.username,
                    studentId: u.username,
                    name: u.name,
                    classId: null
                }));
                localStorage.setItem(STORAGE_KEYS.STUDENT_LIST, JSON.stringify(studentList));
                
                // 初始化教师列表
                const teacherList = users.filter(u => u.role === 'teacher').map(u => ({
                    id: u.username,
                    username: u.username,
                    name: u.name,
                    role: 'teacher'
                }));
                localStorage.setItem(STORAGE_KEYS.TEACHER_LIST, JSON.stringify(teacherList));
            }
        })();

        // ==================== DOM 元素 ====================
        const tabStudent = document.getElementById('tabStudent');
        const tabTeacher = document.getElementById('tabTeacher');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');

        // 忘记密码模态框
        const forgotModal = document.getElementById('forgotModal');
        const openForgotBtn = document.getElementById('openForgotModal');
        const closeForgotBtn = document.getElementById('closeForgotModal');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const resetPwdBtn = document.getElementById('resetPwdBtn');

        // 注册模态框
        const registerModal = document.getElementById('registerModal');
        const openRegisterLink = document.getElementById('openRegisterLink');
        const closeRegisterBtn = document.getElementById('closeRegisterModal');
        const regTabStudent = document.getElementById('regTabStudent');
        const regTabTeacher = document.getElementById('regTabTeacher');
        const registerSubmit = document.getElementById('registerSubmitBtn');

        // ==================== 角色切换 ====================
        let currentRole = 'student';

        tabStudent.addEventListener('click', () => {
            tabStudent.classList.add('active');
            tabTeacher.classList.remove('active');
            currentRole = 'student';
        });

        tabTeacher.addEventListener('click', () => {
            tabTeacher.classList.add('active');
            tabStudent.classList.remove('active');
            currentRole = 'teacher';
        });

        // 输入框焦点效果
        document.querySelectorAll('.input-wrapper input').forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.input-wrapper').classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.closest('.input-wrapper').classList.remove('focused');
            });
        });

        // ==================== 记住密码填充 ====================
        (function loadSavedLogin() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.LOGIN_INFO) || '{}');
                if (saved.username && saved.expireTime > Date.now()) {
                    usernameInput.value = saved.username;
                    if (saved.role === 'student') {
                        tabStudent.click();
                    } else {
                        tabTeacher.click();
                    }
                    // 从用户列表获取密码（演示用）
                    const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                    const user = users.find(u => u.username === saved.username && u.role === saved.role);
                    if (user) {
                        passwordInput.value = user.password;
                    }
                    rememberMe.checked = true;
                }
            } catch (e) {}
        })();

        // ==================== 登录事件 ====================
        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const role = currentRole;

            if (!username || !password) {
                alert('❌ 请输入账号和密码');
                return;
            }

            // 从本地存储验证
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            const user = users.find(u => u.username === username && u.password === password && u.role === role);

            if (user) {
                // 记住密码处理
                if (rememberMe.checked) {
                    const loginInfo = {
                        username,
                        role,
                        expireTime: Date.now() + 7 * 24 * 60 * 60 * 1000
                    };
                    localStorage.setItem(STORAGE_KEYS.LOGIN_INFO, JSON.stringify(loginInfo));
                } else {
                    localStorage.removeItem(STORAGE_KEYS.LOGIN_INFO);
                }

                // 保存当前用户
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({
                    username,
                    role,
                    name: user.name
                }));

                // 跳转
                const targetPage = role === 'student' ? '/pages/student_index.html' : '/pages/teacher_index.html';
                window.location.href = targetPage;
            } else {
                alert('❌ 账号或密码错误，请重试');
            }
        });

        // 回车登录
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        // ==================== 忘记密码逻辑 ====================
        openForgotBtn.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.style.display = 'flex';
        });

        closeForgotBtn.addEventListener('click', () => {
            forgotModal.style.display = 'none';
        });

        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) {
                forgotModal.style.display = 'none';
            }
        });

        // 发送验证码（演示模式）
        sendCodeBtn.addEventListener('click', () => {
            const username = document.getElementById('forgotUsername').value.trim();
            const role = document.getElementById('forgotRole').value.trim();
            if (!username || !role) {
                alert('请输入账号和身份');
                return;
            }
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (!users.some(u => u.username === username && u.role === role)) {
                alert('❌ 该账号不存在');
                return;
            }

            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';
            setTimeout(() => {
                alert('✅ 演示模式：验证码为 123456');
                let countdown = 60;
                const timer = setInterval(() => {
                    countdown--;
                    sendCodeBtn.textContent = `${countdown}秒后重发`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '获取验证码';
                    }
                }, 1000);
            }, 1000);
        });

        resetPwdBtn.addEventListener('click', () => {
            const username = document.getElementById('forgotUsername').value.trim();
            const role = document.getElementById('forgotRole').value.trim();
            const code = document.getElementById('forgotCode').value.trim();
            const newPwd = document.getElementById('newPassword').value.trim();
            const confirmPwd = document.getElementById('confirmNewPassword').value.trim();

            if (!username || !role || !code || !newPwd || !confirmPwd) {
                alert('请填写完整信息');
                return;
            }
            if (newPwd !== confirmPwd) {
                alert('两次密码不一致');
                return;
            }
            if (newPwd.length < 6) {
                alert('密码至少6位');
                return;
            }
            if (code !== '123456') {
                alert('❌ 验证码错误');
                return;
            }

            // 更新密码
            let users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            users = users.map(u => (u.username === username && u.role === role) ? { ...u, password: newPwd } : u);
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));

            alert('✅ 密码重置成功！请使用新密码登录');
            forgotModal.style.display = 'none';
        });

        // ==================== 注册逻辑 ====================
        openRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerModal.style.display = 'flex';
        });

        closeRegisterBtn.addEventListener('click', () => {
            registerModal.style.display = 'none';
        });

        registerModal.addEventListener('click', (e) => {
            if (e.target === registerModal) {
                registerModal.style.display = 'none';
            }
        });

        // 注册角色切换
        let regRole = 'student';
        regTabStudent.addEventListener('click', () => {
            regTabStudent.classList.add('active');
            regTabTeacher.classList.remove('active');
            regRole = 'student';
        });
        regTabTeacher.addEventListener('click', () => {
            regTabTeacher.classList.add('active');
            regTabStudent.classList.remove('active');
            regRole = 'teacher';
        });

        registerSubmit.addEventListener('click', () => {
            const username = document.getElementById('regUsername').value.trim();
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirmPwd = document.getElementById('regConfirmPwd').value.trim();

            if (!username || !name || !password || !confirmPwd) {
                alert('请填写完整信息');
                return;
            }
            if (password !== confirmPwd) {
                alert('两次密码不一致');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6位');
                return;
            }

            let users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (users.some(u => u.username === username && u.role === regRole)) {
                alert('❌ 该账号已存在');
                return;
            }

            // 添加新用户
            const newUser = { username, password, role: regRole, name };
            users.push(newUser);
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));

            // 更新学生/教师列表
            if (regRole === 'student') {
                let studentList = JSON.parse(localStorage.getItem(STORAGE_KEYS.STUDENT_LIST) || '[]');
                studentList.push({ id: username, studentId: username, name, classId: null });
                localStorage.setItem(STORAGE_KEYS.STUDENT_LIST, JSON.stringify(studentList));
            } else {
                let teacherList = JSON.parse(localStorage.getItem(STORAGE_KEYS.TEACHER_LIST) || '[]');
                teacherList.push({ id: username, username, name, role: 'teacher' });
                localStorage.setItem(STORAGE_KEYS.TEACHER_LIST, JSON.stringify(teacherList));
            }

            alert('✅ 注册成功！请登录');
            registerModal.style.display = 'none';
        });

        // ==================== 模态框关闭按钮样式 ====================
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
</html>
