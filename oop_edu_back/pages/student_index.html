<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <base href="/pages/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生中心 · OOP智慧教学平台</title>
    <!-- 字体与图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jieba/0.12.1/jieba.min.js"></script>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            display: flex;
            height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #0f172a 100%);
            overflow: hidden;
            color: #e2e8f0;
        }

        /* ==================== 自定义滚动条 ==================== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* ==================== 侧边栏样式 ==================== */
        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 28px 0;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .sidebar-logo {
            text-align: center;
            padding: 0 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 18px;
        }
        
        .sidebar-logo h3 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sidebar-logo p {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 0 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.6);
        }

        .menu-item i {
            width: 22px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(4px);
        }

        .menu-item:hover i {
            color: #3b82f6;
        }

        .menu-item.active {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .menu-item.active i {
            color: #fff;
        }

        /* ==================== 主内容区样式 ==================== */
        .main {
            flex: 1;
            padding: 32px 36px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
        }

        /* ==================== 标题样式 ==================== */
        .page-title {
            font-size: 32px;
            color: #fff;
            margin-bottom: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 16px;
            letter-spacing: -0.5px;
        }

        .page-title::before {
            content: '';
            width: 6px;
            height: 32px;
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
            border-radius: 3px;
        }

        .page-title i {
            color: #3b82f6;
            font-size: 28px;
        }

        /* ==================== 卡片样式 ==================== */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 25px 45px -12px #3b82f6;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #3b82f6;
            font-size: 20px;
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
        }

        .btn-success {
            background: linear-gradient(90deg, #10b981, #059669);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            color: #fff;
        }

        /* ==================== 头像样式 ==================== */
        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 3px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #3b82f6;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .avatar:hover {
            transform: scale(1.05);
            border-color: #8b5cf6;
            box-shadow: 0 0 30px #3b82f6;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ==================== 表单样式 ==================== */
        .form-input {
            width: 100%;
            padding: 12px 18px;
            margin: 8px 0 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            font-size: 14px;
            color: #fff;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .form-input::placeholder {
            color: #475569;
        }

        /* ==================== 知识图谱容器 ==================== */
        .graph-container {
            width: 100%;
            height: 550px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 16px;
        }

        /* ==================== 热词标签 ==================== */
        .knowledge-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            margin: 0 6px 8px 0;
            transition: all 0.2s ease;
        }

        .knowledge-tag:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }

        .knowledge-tag .score {
            background: #3b82f6;
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        /* ==================== 掌握度进度条 ==================== */
        .mastery-progress {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .mastery-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* ==================== 作业卡片 ==================== */
        .homework-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s ease;
        }

        .homework-item:hover {
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .homework-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .homework-meta {
            display: flex;
            gap: 20px;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .homework-meta i {
            color: #3b82f6;
            margin-right: 4px;
        }

        /* ==================== 视频卡片 ==================== */
        .video-card {
            display: flex;
            gap: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .video-card:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateX(4px);
        }

        .video-thumbnail {
            width: 160px;
            height: 90px;
            background: #1e293b;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .video-thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-thumbnail:hover .play-icon {
            opacity: 1;
        }

        /* ==================== 模态框 ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            width: 90%;
            max-width: 700px;
            background: #1e293b;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 22px;
            color: #fff;
            font-weight: 600;
        }

        .close-modal {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* ==================== AI批改结果 ==================== */
        .ai-result {
            background: #0f172a;
            padding: 24px;
            border-radius: 20px;
            margin: 16px 0;
        }

        .ai-score {
    font-size: 56px;
    font-weight: 700;
    text-align: center;
    margin: 16px 0;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
}
        .dimension-item {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
        }

        /* ==================== 加载动画 ==================== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
            color: #3b82f6;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 10px;
            }
            .sidebar-menu {
                display: flex;
                overflow-x: auto;
            }
            .menu-item {
                white-space: nowrap;
            }
            .main {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== 侧边栏 ==================== -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <h3>OOP 智慧学习</h3>
            <p>基于七章知识图谱</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="loadDashboard()">
                <i class="fas fa-home"></i>
                <span>学习首页</span>
            </div>
            <div class="menu-item" onclick="loadKnowledgeGraph()">
                <i class="fas fa-project-diagram"></i>
                <span>知识图谱</span>
            </div>
            <div class="menu-item" onclick="loadHomework()">
                <i class="fas fa-pen-to-square"></i>
                <span>我的作业</span>
            </div>
            <div class="menu-item" onclick="loadRecommend()">
                <i class="fas fa-star"></i>
                <span>个性化推荐</span>
            </div>
            <div class="menu-item" onclick="loadMyClass()">
                <i class="fas fa-users"></i>
                <span>我的班级</span>
            </div>
            <div class="menu-item" onclick="loadAnalysis()">
                <i class="fas fa-chart-line"></i>
                <span>学习分析</span>
            </div>
            <div class="menu-item" onclick="loadRanking()">
                <i class="fas fa-trophy"></i>
                <span>作业排名</span>
            </div>
            <div class="menu-item" onclick="loadNLP()">
                <i class="fas fa-microchip"></i>
                <span>NLP分析</span>
            </div>
            <div class="menu-item" onclick="loadDocuments()">
                <i class="fas fa-file-powerpoint"></i>
                <span>课程文档</span>
            </div>
            <div class="menu-item" onclick="loadMessage()">
                <i class="fas fa-bell"></i>
                <span>消息通知</span>
            </div>
            <div class="menu-item" onclick="loadSettings()">
                <i class="fas fa-gear"></i>
                <span>个人设置</span>
            </div>
        </div>
    </div>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main">
        <div class="page-title" id="pageTitle">
            <i class="fas fa-home"></i>
            学习首页
        </div>
        <div id="content"></div>
    </div>

    <!-- ==================== 作业提交模态框 ==================== -->
    <div class="modal" id="homeworkModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">提交作业</h3>
                <button class="close-modal" onclick="closeModal('homeworkModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <textarea id="answerContent" class="form-input" rows="8" placeholder="请输入代码答案..."></textarea>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-primary" onclick="submitHomework()">
                    <i class="fas fa-robot"></i> AI智能批改
                </button>
                <button class="btn btn-secondary" onclick="closeModal('homeworkModal')">
                    <i class="fas fa-times"></i> 取消
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 图片作业模态框 ==================== -->
    <div class="modal" id="imageHomeworkModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-camera"></i> 拍照上传代码</h3>
                <button class="close-modal" onclick="closeModal('imageHomeworkModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="form-input" style="padding: 30px; text-align: center; cursor: pointer;" onclick="document.getElementById('codeImage').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #3b82f6; margin-bottom: 12px;"></i>
                <p>点击上传代码图片</p>
                <p style="font-size: 12px; color: #64748b;">支持JPG/PNG格式</p>
                <input type="file" id="codeImage" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </div>
            <div id="imagePreview" style="display: none; margin: 16px 0; text-align: center;">
                <img id="previewImg" src="" style="max-width: 100%; max-height: 200px; border-radius: 12px;">
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn btn-primary" onclick="submitImageHomework()">
                    <i class="fas fa-robot"></i> AI识别并批改
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== AI批改结果模态框 ==================== -->
    <div class="modal" id="aiResultModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>AI智能批改结果</h3>
                <button class="close-modal" onclick="closeModal('aiResultModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="aiResultContent" class="ai-result"></div>
        </div>
    </div>

    <!-- ==================== 视频预览模态框 ==================== -->
    <div class="modal" id="videoModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="videoTitle">视频预览</h3>
                <button class="close-modal" onclick="closeModal('videoModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <video id="videoPlayer" controls style="width: 100%; border-radius: 16px;">
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- ==================== 文档预览模态框 ==================== -->
    <div class="modal" id="docModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="docTitle">文档预览</h3>
                <button class="close-modal" onclick="closeModal('docModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="docContent" style="background: #0f172a; padding: 24px; border-radius: 16px; max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- ==================== 头像预览模态框 ==================== -->
    <div class="modal" id="avatarModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>预览头像</h3>
                <button class="close-modal" onclick="closeModal('avatarModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div style="text-align: center; padding: 20px;">
                <img id="avatarPreview" src="" style="width: 200px; height: 200px; border-radius: 50%; border: 4px solid #3b82f6;">
            </div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-primary" onclick="confirmAvatar()">确认上传</button>
                <button class="btn btn-secondary" onclick="closeModal('avatarModal')">重新选择</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== PPT知识点数据（来自七章PPT）====================
        const PPT_KNOWLEDGE_NODES = [
            // 第一章：C++语言编程入门
            { id: "cpp_origin", name: "C++语言产生", category: 0, size: 55, difficulty: 1, chapter: 1, 
              description: "由AT&T贝尔实验室Bjarne Stroustrup博士在C语言基础上开发" },
            { id: "cpp_vs_c", name: "C++与C语言关系", category: 0, size: 50, difficulty: 1, chapter: 1,

        function updateMastery(knowledgeId) {
            // 更新知识点掌握度（错误次数+1）
            if (!masteryData[knowledgeId]) {
                masteryData[knowledgeId] = { errorCount: 0, lastError: null };
            }
            masteryData[knowledgeId].errorCount += 1;
            masteryData[knowledgeId].lastError = new Date().toISOString();
            saveMasteryToStorage();
        }

        function getMasteryLevel(knowledgeId) {
            // 根据错误次数计算掌握度（0-100）
            // 掌握度 = max(30, 100 - errorCount * 8)
            if (!masteryData[knowledgeId]) return 70; // 默认70
            const errorCount = masteryData[knowledgeId].errorCount || 0;
            return Math.max(30, 100 - errorCount * 8);
        }

            const level = getMasteryLevel(knowledgeId);
            if (level >= 80) return '#10b981'; // 绿色 - 掌握良好

        // ==================== AI批改函数 ====================
        function aiGradeHomework(code, knowledgePoints = []) {
            const result = {
                totalScore: 0,
                dimensions: {
                    syntax: { score: 0, max: 30, issues: [] },
                    logic: { score: 0, max: 30, issues: [] },
                    standard: { score: 0, max: 20, issues: [] },
                    knowledge: { score: 0, max: 20, issues: [] }
                },
                suggestions: [],
                code: code,
                feedback: '',
                timestamp: new Date().toLocaleString()
            };

            const lowerCode = code.toLowerCase();

            // 语法检查
            const syntaxChecks = [
                { pattern: /class\s+\w+/, name: '类定义', score: 5 },
                { pattern: /\w+\s*\([^)]*\)\s*{/, name: '函数定义', score: 5 },
                { pattern: /[{}]/, name: '代码块括号', score: 5 },
                { pattern: /;/, name: '语句结束符', score: 5 },
                { pattern: /if\s*\(|else/, name: '条件语句', score: 5 },
                { pattern: /for\s*\(|while\s*\(/, name: '循环语句', score: 5 }
            ];

            syntaxChecks.forEach(check => {
                if (check.pattern.test(code)) {
                    result.dimensions.syntax.score += check.score;
                } else {
                    result.dimensions.syntax.issues.push(`缺少${check.name}`);
                }
            });

            // 括号匹配
            const openBraces = (code.match(/{/g) || []).length;
            const closeBraces = (code.match(/}/g) || []).length;
            if (openBraces !== closeBraces) {
                result.dimensions.syntax.score -= 5;
                result.dimensions.syntax.issues.push(`括号不匹配 (${openBraces}个{，${closeBraces}个})`);
            }

            // 代码规范
            if (code.includes('    ') || code.includes('\t')) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('缩进不规范');
            }

            if (code.includes('//') || code.includes('/*')) {
                result.dimensions.standard.score += 5;
            } else {
                result.dimensions.standard.issues.push('缺少注释');
            }

            // 知识点检查
            knowledgePoints.forEach(point => {
                const node = PPT_KNOWLEDGE_NODES.find(n => n.name === point || n.id === point);
                if (node) {
                    if (lowerCode.includes(node.name.toLowerCase())) {
                        result.dimensions.knowledge.score += 5;
                    } else {
                        result.dimensions.knowledge.issues.push(`未使用「${node.name}」相关语法`);
                    }
                }
            });

            // 限制分数
            result.dimensions.syntax.score = Math.min(result.dimensions.syntax.score, 30);
            result.dimensions.logic.score = Math.min(result.dimensions.logic.score, 30);
            result.dimensions.standard.score = Math.min(result.dimensions.standard.score, 20);
            result.dimensions.knowledge.score = Math.min(result.dimensions.knowledge.score, 20);

            result.totalScore = result.dimensions.syntax.score + 
                              result.dimensions.logic.score + 
                              result.dimensions.standard.score + 
                              result.dimensions.knowledge.score;

            // 生成评语
            if (result.totalScore >= 90) result.feedback = '🌟 非常优秀！代码质量很高。';
            else if (result.totalScore >= 80) result.feedback = '✨ 良好！代码基本正确。';
            else if (result.totalScore >= 70) result.feedback = '📚 尚可，有改进空间。';
            else if (result.totalScore >= 60) result.feedback = '🔨 及格，建议根据建议完善。';
            else result.feedback = '💪 需要加强，多练习。';

            return result;
        }

        // ==================== 显示AI批改结果 ====================
        function displayAIResult(result, homeworkTitle) {
            const d = result.dimensions;
            let html = `
                <div class="ai-score">${result.totalScore} 分</div>
                <div style="text-align: center; color: #94a3b8; margin-bottom: 20px;">
                    <i class="fas fa-clock"></i> ${result.timestamp}
                </div>
            `;

            // 维度得分
            const dimensions = [
                { name: '语法正确性', score: d.syntax.score, max: d.syntax.max, issues: d.syntax.issues },
                { name: '逻辑完整性', score: d.logic.score, max: d.logic.max, issues: d.logic.issues },
                { name: '代码规范', score: d.standard.score, max: d.standard.max, issues: d.standard.issues },
                { name: '知识点运用', score: d.knowledge.score, max: d.knowledge.max, issues: d.knowledge.issues }
            ];

            dimensions.forEach(dim => {
                const percentage = (dim.score / dim.max) * 100;
                let color = percentage >= 80 ? '#10b981' : percentage >= 60 ? '#3b82f6' : percentage >= 40 ? '#f59e0b' : '#ef4444';
                
                html += `
                    <div class="dimension-item">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="color: #fff;">${dim.name}</span>
                            <span style="color: ${color}; font-weight: 600;">${dim.score}/${dim.max}</span>
                        </div>
                        <div class="mastery-progress">
                            <div class="mastery-fill" style="width: ${percentage}%; background: ${color};"></div>
                        </div>
                        ${dim.issues.length > 0 ? `
                            <div style="margin-top: 8px; color: #ef4444; font-size: 13px;">
                                ${dim.issues.map(i => `<div>• ${i}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += `
                <div style="margin-top: 20px; padding: 16px; background: rgba(59, 130, 246, 0.1); border-radius: 16px;">
                    <p style="color: #fff;">📝 评语：${result.feedback}</p>
                </div>
            `;

            document.getElementById('aiResultContent').innerHTML = html;
            document.getElementById('aiResultModal').style.display = 'flex';
        }

        function submitHomework() {
            const answer = document.getElementById('answerContent').value.trim();
            if (!answer) {

                return;

            // 提取知识点标签
            const knowledgePoints = currentHomework.knowledgeTag ? currentHomework.knowledgeTag.split(',') : [];
            
            // AI批改
            const result = aiGradeHomework(answer, knowledgePoints);

            // 保存批改记录
            let checkedHomework = JSON.parse(localStorage.getItem('checkedHomework') || '[]');
            checkedHomework.push({
                ...result,
                homeworkId: currentHomework.id,
                homeworkTitle: currentHomework.title,
                studentId: currentStudent.id,
                studentName: currentStudent.name,
                knowledgePoints: knowledgePoints
            });
            localStorage.setItem('checkedHomework', JSON.stringify(checkedHomework));

            // 更新知识点掌握度（如果分数低于60）
            if (result.totalScore < 60) {
                knowledgePoints.forEach(point => {
                    const node = PPT_KNOWLEDGE_NODES.find(n => n.name === point);

            closeModal('homeworkModal');

        function joinClass() {
            const code = document.getElementById('classCode').value.trim();
            const classList = JSON.parse(localStorage.getItem('classList') || '[]');
            const targetClass = classList.find(c => c.inviteCode === code);

            if (!targetClass) {
                document.getElementById('joinResult').innerHTML = '<span style="color: #ef4444;">❌ 邀请码无效</span>';
                return;
            }

            if (currentStudent.classId) {
                document.getElementById('joinResult').innerHTML = '<span style="color: #ef4444;">❌ 已加入其他班级</span>';
                return;
            }

            // 更新学生列表
            let studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
            studentList = studentList.map(s => 
                s.id === currentStudent.id ? { ...s, classId: targetClass.id } : s
            );
            localStorage.setItem('studentList', JSON.stringify(studentList));

            // 更新班级学生计数
            let updatedClassList = classList.map(c => 
                c.id === targetClass.id ? { ...c, studentCount: (c.studentCount || 0) + 1 } : c
            );
            localStorage.setItem('classList', JSON.stringify(updatedClassList));

            // 更新当前学生
            currentStudent.classId = targetClass.id;

            document.getElementById('joinResult').innerHTML = `<span style="color: #10b981;">✅ 成功加入：${targetClass.name}</span>`;
            setTimeout(() => loadMyClass(), 1500);
        }

        function quitClass() {
            if (!confirm('确定退出班级吗？')) return;

            let studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
            studentList = studentList.map(s => 
                s.id === currentStudent.id ? { ...s, classId: null } : s
            );
            localStorage.setItem('studentList', JSON.stringify(studentList));

            let classList = JSON.parse(localStorage.getItem('classList') || '[]');
            classList = classList.map(c => 
                c.id === currentStudent.classId ? { ...c, studentCount: Math.max(0, (c.studentCount || 0) - 1) } : c
            );
            localStorage.setItem('classList', JSON.stringify(classList));

            currentStudent.classId = null;
            loadMyClass();
        }

            const studentList = JSON.parse(localStorage.getItem('studentList') || '[]');

            // 按作业分组
            const groupedByHomework = {};
            checkedHomework.forEach(s => {
                if (!groupedByHomework[s.homeworkTitle]) {
                    groupedByHomework[s.homeworkTitle] = [];
                }
                groupedByHomework[s.homeworkTitle].push(s);
            });

            let html = '';
            for (let title in groupedByHomework) {
                const list = groupedByHomework[title]
                    .sort((a, b) => (b.totalScore || b.score || 0) - (a.totalScore || a.score || 0))
                    .slice(0, 10);

                html += `
                    <div class="glass-card">
                        <div class="card-title">
                            <i class="fas fa-trophy"></i>
                            ${title}
                        </div>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <th style="padding: 12px 0; text-align: left;">排名</th>
                                <th style="padding: 12px 0; text-align: left;">学生</th>
                                <th style="padding: 12px 0; text-align: left;">分数</th>
                            </tr>
                            ${list.map((s, i) => {
                                const isMe = s.studentId === currentStudent.id;
                                let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                                return `
                                    <tr style="${isMe ? 'background: rgba(59, 130, 246, 0.1);' : ''}">
                                        <td style="padding: 8px 0;">${i+1} ${medal}</td>
                                        <td style="padding: 8px 0;">${isMe ? '我' : s.studentName || s.studentId}</td>
                                        <td style="padding: 8px 0; font-weight: 600; color: ${i === 0 ? '#ef4444' : i === 1 ? '#f59e0b' : '#3b82f6'};">${s.totalScore || s.score}分</td>
                                    </tr>
                                `;
                            }).join('')}
                        </table>
                    </div>
                `;
            }

            if (html === '') {
                html = `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-trophy" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin-top: 20px;">暂无排名数据</div>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = html;
        }

        // ==================== NLP分析 ====================
        function loadNLP() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-microchip"></i> NLP智能分析';

            document.getElementById('content').innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="glass-card">
                        <div class="card-title">
                            <i class="fas fa-edit"></i>
                            文本输入
                        </div>
                        <textarea id="nlpText" class="form-input" rows="8" placeholder="请输入文本内容..."></textarea>
                        <div style="display: flex; gap: 12px; margin-top: 16px;">
                            <button class="btn btn-primary" onclick="extractKeywords()">
                                <i class="fas fa-search"></i> 提取热词
                            </button>
                            <button class="btn btn-secondary" onclick="document.getElementById('nlpText').value = ''">
                                <i class="fas fa-trash"></i> 清空
                            </button>
                        </div>
                    </div>
                    <div class="glass-card">
                        <div class="card-title">
                            <i class="fas fa-chart-pie"></i>
                            分析结果
                        </div>
                        <div id="nlpResult" style="min-height: 200px; color: #94a3b8; text-align: center; padding: 40px;">
                            <i class="fas fa-chart-pie" style="font-size: 48px; margin-bottom: 16px;"></i>
                            <div>暂无分析结果</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function extractKeywords() {
            const text = document.getElementById('nlpText').value.trim();
            if (!text) {
                alert('请输入文本');
                return;
            }

            document.getElementById('nlpResult').innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>正在分析...</span>
                </div>
            `;

            setTimeout(() => {
                try {
                    jieba.load();
                    const words = jieba.cut(text, false);
                    const wordCount = {};
                    const stopWords = ['的', '了', '是', '在', '和', '与', '有', '我', '你', '他'];

                    words.forEach(w => {
                        if (w.length > 1 && !stopWords.includes(w)) {
                            wordCount[w] = (wordCount[w] || 0) + 1;
                        }
                    });

                    const sorted = Object.entries(wordCount)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 15);

                    let html = '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
                    sorted.forEach(([word, count]) => {
                        const size = 14 + count * 2;
                        html += `<span style="font-size: ${size}px; color: #3b82f6; padding: 4px 8px; background: rgba(59, 130, 246, 0.1); border-radius: 20px;">${word} (${count})</span>`;
                    });
                    html += '</div>';

                    document.getElementById('nlpResult').innerHTML = html;
                } catch (e) {
                    document.getElementById('nlpResult').innerHTML = '<div style="color: #ef4444;">分析失败</div>';
                }
            }, 800);
        }

        // ==================== 课程文档 ====================
        function loadDocuments() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-file-powerpoint"></i> 课程文档';

            const documents = [
                { id: 1, title: '第一章 C++语言编程入门', content: 'C++语言的产生、开发步骤、数据类型、控制语句等...', type: 'ppt' },
                { id: 2, title: '第二章 函数', content: '函数的定义、调用、参数传递、重载等...', type: 'ppt' },
                { id: 3, title: '第三章 类与对象', content: '类的声明、构造函数、析构函数、静态成员等...', type: 'ppt' },
                { id: 4, title: '第四章 指针与引用', content: '指针运算、动态内存分配、引用等...', type: 'ppt' },
                { id: 5, title: '第五章 继承', content: '单继承、多继承、虚基类、二义性问题...', type: 'ppt' },
                { id: 6, title: '第六章 运算符重载', content: '一元运算符、二元运算符、特殊运算符重载...', type: 'ppt' },
                { id: 7, title: '第七章 多态与虚函数', content: '虚函数、纯虚函数、抽象类、动态联编...', type: 'ppt' }
            ];

            let html = '<div class="glass-card"><div class="card-title"><i class="fas fa-file-powerpoint"></i> 教学文档</div>';
            
            documents.forEach(doc => {
                html += `
                    <div class="homework-item" onclick="viewDocument('${doc.title}', '${doc.content}')" style="cursor: pointer;">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-file-powerpoint" style="font-size: 32px; color: #f59e0b;"></i>
                            <div>
                                <div style="font-weight: 600; color: #fff;">${doc.title}</div>
                                <div style="color: #94a3b8; font-size: 12px;">点击预览</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        function viewDocument(title, content) {
            document.getElementById('docTitle').innerText = title;
            document.getElementById('docContent').innerText = content;
            document.getElementById('docModal').style.display = 'flex';
        }

        // ==================== 消息通知 ====================
        function loadMessage() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-bell"></i> 消息通知';

            const notifications = JSON.parse(localStorage.getItem(`notifications_${currentStudent.id}`) || '[]');

            if (notifications.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-bell-slash" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin-top: 20px;">暂无消息通知</div>
                    </div>
                `;
                return;
            }

            let html = '<div class="glass-card"><div class="card-title"><i class="fas fa-bell"></i> 通知列表</div>';
            
            notifications.sort((a, b) => new Date(b.time) - new Date(a.time)).forEach(n => {
                html += `
                    <div style="padding: 16px; background: rgba(255, 255, 255, 0.02); border-radius: 16px; margin-bottom: 12px; border-left: 4px solid #3b82f6;">
                        <div style="font-weight: 600; color: #fff; margin-bottom: 4px;">${n.title}</div>
                        <div style="color: #94a3b8; font-size: 13px; margin-bottom: 8px;">${n.content}</div>
                        <div style="color: #64748b; font-size: 11px;">${n.time}</div>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        // ==================== 个人设置 ====================
        let tempAvatarFile = null;

        function loadSettings() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-gear"></i> 个人设置';

            document.getElementById('content').innerHTML = `
                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-user-circle"></i>
                        头像设置
                    </div>
                    <div class="avatar-container">
                        <div class="avatar" onclick="document.getElementById('avatarUpload').click()">
                            ${currentStudent.avatar ? 
                                `<img src="${currentStudent.avatar}" alt="头像">` : 
                                `<i class="fas fa-user"></i>`
                            }
                        </div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="previewAvatar(this)">
                        <button class="btn btn-secondary" onclick="document.getElementById('avatarUpload').click()">
                            <i class="fas fa-camera"></i> 更换头像
                        </button>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-id-card"></i>
                        个人信息
                    </div>
                    <input type="text" id="userName" class="form-input" value="${currentStudent.name}" placeholder="姓名">
                    <input type="text" class="form-input" value="${currentStudent.id}" disabled placeholder="学号">
                    <button class="btn btn-primary" onclick="saveUserInfo()">
                        <i class="fas fa-save"></i> 保存信息
                    </button>
                </div>

                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-key"></i>
                        修改密码
                    </div>
                    <input type="password" id="oldPwd" class="form-input" placeholder="原密码">
                    <input type="password" id="newPwd1" class="form-input" placeholder="新密码（至少6位）">
                    <input type="password" id="newPwd2" class="form-input" placeholder="确认新密码">
                    <button class="btn btn-primary" onclick="changePassword()">
                        <i class="fas fa-key"></i> 修改密码
                    </button>
                    <div id="pwdTip" style="margin-top: 12px; color: #ef4444; font-size: 13px;"></div>
                </div>
            `;
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                    document.getElementById('avatarModal').style.display = 'flex';
                    tempAvatarFile = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function confirmAvatar() {
            if (!tempAvatarFile) return;

            // 更新学生列表
            let studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
            studentList = studentList.map(s => 
                s.id === currentStudent.id ? { ...s, avatar: tempAvatarFile } : s
            );
            localStorage.setItem('studentList', JSON.stringify(studentList));

            currentStudent.avatar = tempAvatarFile;
            closeModal('avatarModal');
            loadSettings();
        }

        function saveUserInfo() {
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                alert('姓名不能为空');
                return;
            }

            // 更新学生列表
            let studentList = JSON.parse(localStorage.getItem('studentList') || '[]');
            studentList = studentList.map(s => 
                s.id === currentStudent.id ? { ...s, name } : s
            );
            localStorage.setItem('studentList', JSON.stringify(studentList));

            // 更新用户表
            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            users = users.map(u => u.username === currentStudent.id ? { ...u, name } : u);
            localStorage.setItem('edu_users', JSON.stringify(users));

            currentStudent.name = name;
            alert('✅ 保存成功');
        }

        function changePassword() {
            const oldPwd = document.getElementById('oldPwd').value;
            const newPwd1 = document.getElementById('newPwd1').value;
            const newPwd2 = document.getElementById('newPwd2').value;
            const tip = document.getElementById('pwdTip');

            if (!oldPwd || !newPwd1 || !newPwd2) {
                tip.innerText = '请填写完整';
                return;
            }

            if (newPwd1 !== newPwd2) {
                tip.innerText = '两次密码不一致';
                return;
            }

            if (newPwd1.length < 6) {
                tip.innerText = '密码至少6位';
                return;
            }

            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            const user = users.find(u => u.username === currentStudent.id);

            if (!user) {
                tip.innerText = '用户不存在';
                return;
            }

            if (user.password !== oldPwd) {
                tip.innerText = '原密码错误';
                return;
            }

            users = users.map(u => u.username === currentStudent.id ? { ...u, password: newPwd1 } : u);
            localStorage.setItem('edu_users', JSON.stringify(users));

            tip.style.color = '#10b981';
            tip.innerText = '✅ 密码修改成功';
            setTimeout(() => tip.innerText = '', 3000);
        }

        // ==================== 视频播放 ====================
        function playVideo(videoId) {
            const video = videoList.find(v => v.id === videoId);
            if (video) {
                document.getElementById('videoTitle').innerText = video.title;
                const videoPlayer = document.getElementById('videoPlayer');
                videoPlayer.src = video.url;
                videoPlayer.load();
                document.getElementById('videoModal').style.display = 'flex';
            }
        }

        // ==================== 导出全局函数 ====================
        window.loadDashboard = loadDashboard;
        window.loadKnowledgeGraph = loadKnowledgeGraph;
        window.loadHomework = loadHomework;
        window.loadRecommend = loadRecommend;
        window.loadMyClass = loadMyClass;
        window.loadAnalysis = loadAnalysis;
        window.loadRanking = loadRanking;
        window.loadNLP = loadNLP;
        window.loadDocuments = loadDocuments;
        window.loadMessage = loadMessage;
        window.loadSettings = loadSettings;
        window.closeModal = closeModal;
        window.openHomeworkModal = openHomeworkModal;
        window.openImageModal = openImageModal;
        window.submitHomework = submitHomework;
        window.submitImageHomework = submitImageHomework;
        window.viewHomeworkDetail = viewHomeworkDetail;
        window.joinClass = joinClass;
        window.quitClass = quitClass;
        window.previewAvatar = previewAvatar;
        window.confirmAvatar = confirmAvatar;
        window.saveUserInfo = saveUserInfo;
        window.changePassword = changePassword;
        window.extractKeywords = extractKeywords;
        window.viewDocument = viewDocument;
        window.playVideo = playVideo;
        window.previewImage = previewImage;
    </script>
</body>
</html>
