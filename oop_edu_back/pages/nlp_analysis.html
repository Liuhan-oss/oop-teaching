<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP 智能文本分析</title>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud/dist/echarts-wordcloud.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", Arial, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #f0f4ff, #e1e8ff);
    min-height: 100vh;
    padding: 30px 20px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  .page-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .page-header h1 {
    font-size: 28px;
    color: #2c3e50;
    margin-bottom: 8px;
  }

  .page-header p {
    color: #7f8c8d;
    font-size: 15px;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
  }

  .card-title {
    font-size: 18px;
    color: #2c3e50;
    margin-bottom: 16px;
    font-weight: 500;
  }

  textarea {
    width: 100%;
    height: 200px;
    padding: 16px;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border 0.3s;
  }

  textarea:focus {
    border-color: #4a7cf0;
  }

  .btn-analyze {
    background: linear-gradient(90deg, #4a7cf0, #5b8aff);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 30px;
    font-size: 16px;
    margin-top: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .btn-analyze:hover {
    transform: translateY(-2px);
  }

  #wordcloud {
    width: 100%;
    height: 550px;
    border-radius: 16px;
    overflow: hidden;
  }

  .loading {
    text-align: center;
    padding: 30px;
    color: #4a7cf0;
    font-size: 16px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="page-header">
    <h1>🧠 NLP 智能文本分析</h1>
    <p>基于 TextRank 算法 · 自动提取关键词 · 生成专业词云</p >
  </div>

  <div class="card">
    <div class="card-title">📝 输入文本（课程内容、作业、知识点描述）</div>
    <textarea id="text" placeholder="请粘贴一段文本，例如：面向对象编程的三大特性是封装、继承、多态。类是对象的模板，对象是类的实例化。"></textarea>
    <button class="btn-analyze" onclick="analyze()">🚀 开始智能分析</button>
  </div>

  <div class="card">
    <div class="card-title">📊 热词词云展示</div>
    <div id="wordcloud"></div>
  </div>
</div>

<script>
const chart = echarts.init(document.getElementById('wordcloud'));

async function analyze() {
  const text = document.getElementById('text').value.trim();
  if (!text) {
    alert('请输入文本内容');
    return;
  }

  try {
    const res = await axios.post('/api/nlp/extract_keywords', { text });
    const data = res.data.data;

    const option = {
      tooltip: {
        trigger: 'item',
        formatter: '{b}: {c}'
      },
      series: [
        {
          type: 'wordCloud',
          shape: 'circle',
          gridSize: 10,
          sizeRange: [16, 65],
          rotationRange: [-45, 45],
          textStyle: {
            color: function () {
              const colors = [
                '#4a7cf0', '#5b8aff', '#10b981', '#f59e0b',
                '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'
              ];
              return colors[Math.floor(Math.random() * colors.length)];
            }
          },
          data: data
        }
      ]
    };

    chart.setOption(option);
  } catch (err) {
    alert('分析失败，请检查后端服务是否启动');
  }
}
</script>

</body>
</html>
