                                const className = getClassById(s.classId)?.name || '未分配';
                                
                                // 找出薄弱点
                                const weakPoints = PPT_KNOWLEDGE_NODES.filter(node => {
                                    const level = getStudentMastery(s.studentId || s.id, node.id);
                                    return level < 60;
                                }).slice(0, 2).map(n => n.name).join(', ');

                                return `
                                    <tr>
                                        <td>${s.name}</td>
                                        <td>${s.studentId || s.id}</td>
                                        <td>${className}</td>
                                        <td>${submits.length}</td>
                                        <td><span style="color: #f59e0b;">${avg}</span></td>
                                        <td><span style="color: #ef4444;">${weakPoints || '无'}</span></td>
                                        <td>
                                            <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="viewStudentDetail('${s.studentId || s.id}')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                            <button class="btn btn-danger" style="padding: 4px 8px;" onclick="deleteStudent('${s.studentId || s.id}')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </table>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = html;
        }

        function openStudentModal() {
            const classOptions = classList.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('studentClass').innerHTML = `<option value="">选择班级</option>${classOptions}`;
            document.getElementById('studentModal').style.display = 'flex';
        }

        function addStudent() {
            const id = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const classId = document.getElementById('studentClass').value;

            if (!id || !name) {
                alert('请填写完整信息');
                return;
            }

            if (studentList.some(s => (s.studentId === id || s.id === id))) {
                alert('该学号已存在');
                return;
            }

            const newStudent = {
                id: id,
                studentId: id,
                name,
                classId: classId || null
            };

            studentList.push(newStudent);
            localStorage.setItem('studentList', JSON.stringify(studentList));

            // 添加到用户表
            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            if (!users.some(u => u.username === id)) {
                users.push({ username: id, password: '123456', role: 'student', name });
                localStorage.setItem('edu_users', JSON.stringify(users));
            }

            alert('✅ 学生添加成功');
            closeModal('studentModal');
            loadStudentList();
        }

        function deleteStudent(studentId) {
            if (!confirm('确定删除该学生吗？')) return;

            studentList = studentList.filter(s => (s.studentId !== studentId && s.id !== studentId));
            localStorage.setItem('studentList', JSON.stringify(studentList));

            // 从用户表删除
            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            users = users.filter(u => u.username !== studentId);
            localStorage.setItem('edu_users', JSON.stringify(users));

            alert('✅ 学生已删除');
            loadStudentList();
        }

        function viewStudentDetail(studentId) {
            const student = getStudentById(studentId);
            if (!student) return;

            const submits = checkedHomework.filter(c => c.studentId === studentId);
            const avg = submits.length > 0 
                ? Math.round(submits.reduce((sum, c) => sum + (c.totalScore || c.score || 0), 0) / submits.length)
                : 0;

            const className = getClassById(student.classId)?.name || '未分配';

            // 知识点掌握情况
            const masteryData = PPT_KNOWLEDGE_NODES.slice(0, 15).map(node => {
                const level = getStudentMastery(studentId, node.id);
                return { name: node.name, level };
            });

            let html = `
                <div style="margin-bottom: 20px;">
                    <p><strong>姓名：</strong> ${student.name}</p>
                    <p><strong>学号：</strong> ${student.studentId || student.id}</p>
                    <p><strong>班级：</strong> ${className}</p>
                    <p><strong>提交次数：</strong> ${submits.length}</p>
                    <p><strong>平均分：</strong> <span style="color: #f59e0b;">${avg}</span></p>
                </div>
                <div class="card-title"><i class="fas fa-brain"></i> 知识点掌握情况</div>
                <div style="max-height: 300px; overflow-y: auto;">
                    ${masteryData.map(m => {
                        const badgeClass = getMasteryBadgeClass(m.level);
                        return `
                            <div style="margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                    <span>${m.name}</span>
                                    <span class="mastery-badge ${badgeClass}">${m.level}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${m.level}%; background: ${m.level >= 80 ? '#10b981' : m.level >= 60 ? '#3b82f6' : m.level >= 40 ? '#f59e0b' : '#ef4444'};"></div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            document.getElementById('studentDetailName').innerHTML = `${student.name} 的详情`;
            document.getElementById('studentDetailContent').innerHTML = html;
            document.getElementById('studentDetailModal').style.display = 'flex';
        }

        function filterStudents(classId) {
            // 前端过滤已在表格中实现，这里重新加载即可
            loadStudentList();
        }

        // ==================== 班级管理 ====================
        function loadClassManage() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-layer-group"></i> 班级管理';

            let html = `
                <div class="glass-card">
                    <button class="btn btn-primary" onclick="openClassModal()">
                        <i class="fas fa-plus"></i> 创建新班级
                    </button>
                </div>
            `;

            if (classList.length === 0) {
                html += `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-layer-group" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin: 20px 0;">暂无班级，点击上方按钮创建</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="glass-card">
                        <table class="data-table">
                            <tr>
                                <th>班级名称</th>
                                <th>课程</th>
                                <th>学生人数</th>
                                <th>作业数量</th>
                                <th>邀请码</th>
                                <th>操作</th>
                            </tr>
                            ${classList.map(c => {
                                const studentCount = studentList.filter(s => s.classId === c.id).length;
                                const homeworkCount = homeworkList.filter(h => h.class_id === c.id).length;
                                return `
                                    <tr>
                                        <td>${c.name}</td>
                                        <td>${c.course || '面向对象程序设计'}</td>
                                        <td>${studentCount}</td>
                                        <td>${homeworkCount}</td>
                                        <td><code style="background: #1e293b; padding: 4px 8px; border-radius: 8px;">${c.inviteCode}</code></td>
                                        <td>
                                            <button class="btn btn-danger" style="padding: 4px 8px;" onclick="deleteClass('${c.id}')">
                                                <i class="fas fa-trash"></i> 删除
                                            </button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </table>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = html;
        }

        function openClassModal() {
            document.getElementById('className').value = '';
            document.getElementById('classCourse').value = '面向对象程序设计';
            document.getElementById('classModal').style.display = 'flex';
        }

        function createClass() {
            const name = document.getElementById('className').value.trim();
            const course = document.getElementById('classCourse').value.trim();

            if (!name) {
                alert('请输入班级名称');
                return;
            }

            const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();

            const newClass = {
                id: 'class_' + Date.now(),
                name,
                course,
                inviteCode,
                studentCount: 0
            };

            classList.push(newClass);
            localStorage.setItem('classList', JSON.stringify(classList));

            alert(`✅ 班级创建成功！\n邀请码：${inviteCode}`);
            closeModal('classModal');
            loadClassManage();
        }

        function deleteClass(classId) {
            if (!confirm('确定删除该班级吗？这将同时移除班级中的所有学生')) return;

            // 更新学生列表（移出班级）
            studentList = studentList.map(s => 
                s.classId === classId ? { ...s, classId: null } : s
            );
            localStorage.setItem('studentList', JSON.stringify(studentList));

            // 删除班级
            classList = classList.filter(c => c.id !== classId);
            localStorage.setItem('classList', JSON.stringify(classList));

            alert('✅ 班级已删除');
            loadClassManage();
        }

        // ==================== 作业排名 ====================
        function loadRanking() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-trophy"></i> 作业排名';

            if (checkedHomework.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-trophy" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin: 20px 0;">暂无排名数据</div>
                    </div>
                `;
                return;
            }

            // 按作业分组
            const grouped = {};
            checkedHomework.forEach(s => {
                if (!grouped[s.homeworkTitle]) grouped[s.homeworkTitle] = [];
                grouped[s.homeworkTitle].push(s);
            });

            let html = '';
            for (let title in grouped) {
                const list = grouped[title]
                    .sort((a, b) => (b.totalScore || b.score || 0) - (a.totalScore || a.score || 0))
                    .slice(0, 10);

                html += `
                    <div class="glass-card">
                        <div class="card-title">
                            <i class="fas fa-trophy"></i>
                            ${title}
                        </div>
                        <table class="data-table">
                            <tr>
                                <th>排名</th>
                                <th>学生</th>
                                <th>分数</th>
                                <th>提交时间</th>
                            </tr>
                            ${list.map((s, i) => {
                                const student = getStudentById(s.studentId);
                                let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                                return `
                                    <tr>
                                        <td>${i+1} ${medal}</td>
                                        <td>${student?.name || s.studentId}</td>
                                        <td><span style="color: #f59e0b; font-weight: 600;">${s.totalScore || s.score}分</span></td>
                                        <td>${s.time || s.timestamp || ''}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </table>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = html;
        }

        // ==================== AI批改记录 ====================
        function loadAICorrection() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-robot"></i> AI批改记录';

            if (checkedHomework.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-robot" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin: 20px 0;">暂无批改记录</div>
                    </div>
                `;
                return;
            }

            let html = '<div class="glass-card"><div class="card-title"><i class="fas fa-robot"></i> 最近批改</div>';

            checkedHomework.slice().reverse().forEach(s => {
                const student = getStudentById(s.studentId);
                const score = s.totalScore || s.score || 0;
                let scoreColor = score >= 90 ? '#10b981' : score >= 75 ? '#3b82f6' : score >= 60 ? '#f59e0b' : '#ef4444';

                html += `
                    <div style="background: rgba(255,255,255,0.02); padding: 16px; border-radius: 16px; margin-bottom: 12px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <div>
                                <span style="font-weight: 600;">${student?.name || s.studentId}</span>
                                <span style="color: #94a3b8; margin-left: 8px;">${s.homeworkTitle}</span>
                            </div>
                            <span style="color: ${scoreColor}; font-weight: 600;">${score}分</span>
                        </div>
                        <div style="color: #94a3b8; font-size: 13px;">${s.time || s.timestamp || ''}</div>
                        ${s.comment ? `<div style="margin-top: 8px; color: #a5b4fc;">📝 评语：${s.comment}</div>` : ''}
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        // ==================== 消息通知 ====================
        function loadMessage() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-bell"></i> 消息通知';

            const key = `notifications_${currentTeacher.id}`;
            const notifications = JSON.parse(localStorage.getItem(key) || '[]');

            if (notifications.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="glass-card" style="text-align: center; padding: 60px;">
                        <i class="fas fa-bell-slash" style="font-size: 60px; color: #3b82f6;"></i>
                        <div style="color: #94a3b8; margin: 20px 0;">暂无消息通知</div>
                    </div>
                `;
                return;
            }

            let html = '<div class="glass-card"><div class="card-title"><i class="fas fa-bell"></i> 通知列表</div>';

            notifications.sort((a, b) => new Date(b.time) - new Date(a.time)).forEach(n => {
                html += `
                    <div style="padding: 16px; background: rgba(59, 130, 246, 0.1); border-radius: 16px; margin-bottom: 12px; border-left: 4px solid #3b82f6;">
                        <div style="font-weight: 600; color: #fff; margin-bottom: 4px;">${n.title}</div>
                        <div style="color: #94a3b8; font-size: 13px; margin-bottom: 8px;">${n.content}</div>
                        <div style="color: #64748b; font-size: 11px;">${n.time}</div>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        // ==================== 个人设置 ====================
        let tempAvatarFile = null;

        function loadSettings() {
            setActiveMenuItem(event.target);
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-gear"></i> 个人设置';

            document.getElementById('content').innerHTML = `
                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-user-circle"></i>
                        头像设置
                    </div>
                    <div class="avatar-container">
                        <div class="avatar" onclick="document.getElementById('avatarUpload').click()">
                            ${currentTeacher.avatar ? 
                                `<img src="${currentTeacher.avatar}" alt="头像">` : 
                                `<i class="fas fa-user-tie"></i>`
                            }
                        </div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="previewAvatar(this)">
                        <button class="btn btn-secondary" onclick="document.getElementById('avatarUpload').click()">
                            <i class="fas fa-camera"></i> 更换头像
                        </button>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-id-card"></i>
                        教师信息
                    </div>
                    <input type="text" id="teacherName" class="form-input" value="${currentTeacher.name}" placeholder="姓名">
                    <input type="text" class="form-input" value="${currentTeacher.id}" disabled placeholder="工号">
                    <input type="text" id="teacherEmail" class="form-input" value="teacher@school.edu.cn" placeholder="邮箱">
                    <button class="btn btn-primary" onclick="saveTeacherInfo()">
                        <i class="fas fa-save"></i> 保存信息
                    </button>
                </div>

                <div class="glass-card">
                    <div class="card-title">
                        <i class="fas fa-key"></i>
                        修改密码
                    </div>
                    <input type="password" id="oldPwd" class="form-input" placeholder="原密码">
                    <input type="password" id="newPwd1" class="form-input" placeholder="新密码（至少6位）">
                    <input type="password" id="newPwd2" class="form-input" placeholder="确认新密码">
                    <button class="btn btn-primary" onclick="changePassword()">
                        <i class="fas fa-key"></i> 修改密码
                    </button>
                    <div id="pwdTip" style="margin-top: 12px; color: #ef4444; font-size: 13px;"></div>
                </div>
            `;
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                    document.getElementById('avatarModal').style.display = 'flex';
                    tempAvatarFile = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function confirmAvatar() {
            if (!tempAvatarFile) return;

            currentTeacher.avatar = tempAvatarFile;
            
            let teacherList = JSON.parse(localStorage.getItem('teacherList') || '[]');
            teacherList = teacherList.map(t => 
                t.id === currentTeacher.id ? { ...t, avatar: tempAvatarFile } : t
            );
            localStorage.setItem('teacherList', JSON.stringify(teacherList));

            closeModal('avatarModal');
            loadSettings();
        }

        function saveTeacherInfo() {
            const name = document.getElementById('teacherName').value.trim();
            if (!name) {
                alert('姓名不能为空');
                return;
            }

            currentTeacher.name = name;

            let teacherList = JSON.parse(localStorage.getItem('teacherList') || '[]');
            teacherList = teacherList.map(t => 
                t.id === currentTeacher.id ? { ...t, name } : t
            );
            localStorage.setItem('teacherList', JSON.stringify(teacherList));

            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            users = users.map(u => u.username === currentTeacher.id ? { ...u, name } : u);
            localStorage.setItem('edu_users', JSON.stringify(users));

            alert('✅ 信息保存成功');
        }

        function changePassword() {
            const oldPwd = document.getElementById('oldPwd').value;
            const newPwd1 = document.getElementById('newPwd1').value;
            const newPwd2 = document.getElementById('newPwd2').value;
            const tip = document.getElementById('pwdTip');

            if (!oldPwd || !newPwd1 || !newPwd2) {
                tip.innerText = '请填写完整';
                return;
            }

            if (newPwd1 !== newPwd2) {
                tip.innerText = '两次密码不一致';
                return;
            }

            if (newPwd1.length < 6) {
                tip.innerText = '密码至少6位';
                return;
            }

            let users = JSON.parse(localStorage.getItem('edu_users') || '[]');
            const user = users.find(u => u.username === currentTeacher.id);

            if (!user) {
                tip.innerText = '用户不存在';
                return;
            }

            if (user.password !== oldPwd) {
                tip.innerText = '原密码错误';
                return;
            }

            users = users.map(u => u.username === currentTeacher.id ? { ...u, password: newPwd1 } : u);
            localStorage.setItem('edu_users', JSON.stringify(users));

            tip.style.color = '#10b981';
            tip.innerText = '✅ 密码修改成功';
            setTimeout(() => tip.innerText = '', 3000);
        }

        // ==================== 导出全局函数 ====================
        window.loadDashboard = loadDashboard;
        window.loadClassAnalysis = loadClassAnalysis;
        window.loadHomeworkManage = loadHomeworkManage;
        window.loadKnowledgeManage = loadKnowledgeManage;
        window.loadVideoManage = loadVideoManage;
        window.loadStudentList = loadStudentList;
        window.loadClassManage = loadClassManage;
        window.loadRanking = loadRanking;
        window.loadAICorrection = loadAICorrection;
        window.loadMessage = loadMessage;
        window.loadSettings = loadSettings;
        window.closeModal = closeModal;
        window.openHomeworkModal = openHomeworkModal;
        window.publishHomework = publishHomework;
        window.editHomework = editHomework;
        window.deleteHomework = deleteHomework;
        window.gradeHomework = gradeHomework;
        window.openGradeModal = openGradeModal;
        window.submitGrade = submitGrade;
        window.viewGradeDetail = viewGradeDetail;
        window.viewHomeworkSubmits = viewHomeworkSubmits;
        window.openVideoModal = openVideoModal;
        window.previewVideoFile = previewVideoFile;
        window.uploadVideo = uploadVideo;
        window.editVideo = editVideo;
        window.deleteVideo = deleteVideo;
        window.previewVideo = previewVideo;
        window.openStudentModal = openStudentModal;
        window.addStudent = addStudent;
        window.deleteStudent = deleteStudent;
        window.viewStudentDetail = viewStudentDetail;
        window.filterStudents = filterStudents;
        window.openClassModal = openClassModal;
        window.createClass = createClass;
        window.deleteClass = deleteClass;
        window.renderClassAnalysis = renderClassAnalysis;
        window.previewAvatar = previewAvatar;
        window.confirmAvatar = confirmAvatar;
        window.saveTeacherInfo = saveTeacherInfo;
        window.changePassword = changePassword;
    </script>
</body>
</html>
